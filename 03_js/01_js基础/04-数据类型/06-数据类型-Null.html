<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据类型-Null</title>
    <script type="text/javascript">
      /**
       * Null类型介绍
       *
       * 1. null空值 类型的值 只有一个，就是null
       * 2. null这个值专门来表示一个空的对象，
       * 3. 使用typeof检查一个null值时候，会返回object
       */

      let a = null
      console.log(typeof a)
      console.log(a)
    </script>
  </head>
  <body></body>
</html>
