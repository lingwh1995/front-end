<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正则_入门</title>
    <script>
      /**
       * 正则表达式写法一：构造函数 (new RegExp)
       *
       * 1. 参数一：正则表达式字符串（注意：字符串中斜杠需要转义）。
       * 2. 参数二：匹配模式（Flags）。
       *    - i: 忽略大小写 (ignoreCase)
       *    - g: 全局查找 (global)
       */
      const reg = new RegExp('^abc$', 'ig')
      console.log(`使用 test() 进行正则校验：${reg.test('abc')}`)

      /**
       * 正则表达式写法二：字面量 (Literal)
       *
       * 1. 语法结构：/正则表达式/匹配模式
       *    - 示例：/^[abc]$/ig
       * 2. 基础语法：/正则表达式/
       *    - 示例：/^[abc]$/
       * 3. 优势：更加简洁，无需对特殊字符进行字符串层面的二次转义。
       */
      const pattern = /^[a-z]$/gi
      console.log(`使用 test() 进行正则校验：${pattern.test('b')}`)
    </script>
  </head>
  <body></body>
</html>
