<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <title>三目运算符</title>
    <script type="text/javascript">
      /**
       * 三目运算符 (Conditional Operator)
       *
       * 1. 基本定义：
       *    - 也称为三元运算符、条件运算符。
       *
       * 2. 语法结构：
       *    - 条件表达式 ? 语句1 : 语句2;
       *
       * 3. 执行流程：
       *    - 如果条件表达式为真时，运算语句1，并将结果返回。
       *    - 如果条件表达式为假时，运算语句2，并将结果返回。
       */

      // 计算abc最大值
      let a = 10,
        b = 3,
        c = 2
      let max = a > b ? a : b
      max = max > c ? max : c
      console.log(max)
    </script>
  </head>
  <body></body>
</html>
