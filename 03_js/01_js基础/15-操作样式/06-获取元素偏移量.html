<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>获取元素偏移量</title>
    <style>
      /*
      * {
        margin: 0;
        padding: 0;
      }
      */
      .box {
        width: 200px;
        height: 200px;
        background-color: gold;
      }
    </style>
    <script>
      /**
       * 元素偏移量 (Offset) 核心概念
       *
       * 1. offsetLeft：
       *    - 定义：当前元素相对于其内层最近的具有定位属性（非 static）的父元素左边的偏移量。
       *    - 参照点：若无定位父元素，则参照点为 body。
       *
       * 2. offsetTop：
       *    - 定义：当前元素相对于其内层最近的具有定位属性（非 static）的父元素上边的偏移量。
       *    - 参照点：若无定位父元素，则参照点为 body。
       *
       * 3. 注意事项：
       *    - 获取的值为数值类型（Number），不带单位（px）。
       *    - 该值包含元素的 margin，但不包含父元素的 border。
       */

      window.onload = () => {
        /**
         * 场景：获取元素偏移量
         *
         * 功能：点击按钮时，实时计算并弹出 .box 元素相对于其参照点的水平和垂直位移。
         */
        document.querySelector('input[type="button"]').addEventListener('click', () => {
          const box = document.querySelector('.box')
          alert(`水平方向偏移量：${box.offsetLeft}, 垂直方向偏移量：${box.offsetTop}`)
        })
      }
    </script>
  </head>
  <body>
    <input type="button" value="获取元素偏移量" />
    <div class="box"></div>
  </body>
</html>
