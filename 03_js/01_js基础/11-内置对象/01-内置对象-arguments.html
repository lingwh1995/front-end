<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内置对象-arguments</title>
    <script>
      /**
       * 封装实参的对象 arguments
       *
       * 1. 性质：arguments 是一个“类数组”对象（Array-like），具有索引和 length 属性，但不支持 push、pop 等数组方法。
       * 2. 存储机制：在调用函数时，所有传递的实参都会自动保存其中，与形参是否定义无关。
       * 3. 访问方式：
       *    - arguments[0]：表示第一个实参。
       *    - arguments[1]：表示第二个实参。
       * 4. 成员属性：
       *    - length：获取实参的总个数。
       *    - callee：指向当前正在执行的函数（在严格模式下禁用）。
       */
      function add(a, b) {
        // 打印完整的类数组对象
        console.log(arguments)

        // 通过索引访问实参
        console.log('第一个实参:', arguments[0])
        console.log('第二个实参:', arguments[1])

        // 打印当前执行的函数主体
        console.log('当前函数:', arguments.callee)

        // 类型检查：证明它虽然像数组，但并不是 Array 的实例
        console.log('是否为数组实例:', arguments instanceof Array) // false

        return a + b
      }

      console.log('计算结果:', add(1, 2))
    </script>
  </head>
  <body></body>
</html>
