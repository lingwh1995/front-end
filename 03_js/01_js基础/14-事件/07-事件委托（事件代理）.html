<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>事件委托（事件代理）</title>
    <style>
      .parent {
        height: 200px;
        width: 200px;
        background-color: tomato;
      }
      .child {
        height: 25px;
        line-height: 25px;
        background-color: gold;
        margin-top: 5px;
        cursor: pointer;
      }
    </style>

    <script>
      /**
       * JS 事件委托（事件代理）详解
       *
       * 1. 基本定义：
       *    - 利用 JS 事件冒泡动态为元素绑定事件的方法称为事件委托（Event Delegation），也称为“事件代理”。
       *    - 把原本需要绑定在子元素上的事件（onclick、onkeydown等）委托给它的父元素，让父元素来监听子元素的冒泡事件。
       *
       * 2. 为什么要使用事件委托：
       *    - 性能优化：页面内事件处理程序的个数直接影响整体性能，减少对象内存占用。
       *    - 减少 DOM 交互：访问 DOM 次数越多，引起浏览器重绘和重排的次数越多。
       *      * 重绘: 当元素样式改变时，浏览器根据新样式重新绘制外观。
       *      * 重排: 当 DOM 树一部分发生变化（如尺寸改变），浏览器重新创建 DOM 树。
       *    - 简化操作：当页面中大量列表需要添加事件时，极大地减轻工作量。
       *
       * 3. 实现步骤：
       *    - 1) 确定要添加事件元素的父级元素。
       *    - 2) 给父元素定义事件，监听子元素的冒泡事件。
       *    - 3) 使用 event.target 来定位触发事件冒泡的子元素。
       *
       * 4. 注意事项：
       *    - 最好在直接父元素上使用。因为事件冒泡过程也需要消耗时间，距离越远，所需时间越长。
       *
       * 5. 事件委托的优点：
       *    - 减小内存消耗：大量节省内存，减少事件的定义。
       *    - 动态绑定事件：无需为新增元素手动绑定事件，也无需为删除元素解绑事件，减少重复工作。
       */

      /**
       * 获取事件对象
       * 兼容写法：event || window.event
       */
      const getEvent = (event) => {
        return event || window.event
      }

      /**
       * 获取事件目标
       * 兼容写法：target || srcElement
       */
      const getTarget = (event) => {
        return event.target || event.srcElement
      }

      window.onload = () => {
        /**
         * 场景：给父元素绑定事件，实现事件委托
         */
        const parent = document.querySelector('.parent')

        parent.addEventListener('click', (event) => {
          event = getEvent(event)
          const target = getTarget(event)

          // 委托父元素绑定的事件到子元素
          // 方式一：target.getAttribute('class') == 'child'
          // 方式二：如下所示判断 className
          if (target.className == 'child') {
            alert('子元素被点击了')
          }
        })

        /**
         * 场景：点击新添加一个子元素
         * 体现了事件委托“动态绑定”的优点
         */
        const button = document.querySelector('input[type="button"]')
        button.addEventListener('click', () => {
          const child = document.createElement('div')
          child.textContent = '新添加的子元素'
          child.setAttribute('class', 'child')
          const parent = document.querySelector('.parent')
          parent.appendChild(child)
        })
      }
    </script>
  </head>
  <body>
    <div class="parent">
      <div class="child">第一个子元素</div>
      <div class="child">第二个子元素</div>
      <div class="child">第三个子元素</div>
    </div>
    <input type="button" value="添加一个子元素" />
  </body>
</html>
