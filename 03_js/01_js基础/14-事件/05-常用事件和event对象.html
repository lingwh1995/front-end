<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常用事件和event对象</title>
    <script>
      window.onload = () => {
        const btn = document.getElementById('body')

        /**
         * 事件对象 event 完全指南
         *
         * 1. 作用：当事件触发时，浏览器会自动创建一个 event 对象，包含所有与该事件相关的详细信息。
         * 2. 兼容性方案：event = event || window.event (兼容老版本 IE)。
         */

        /**
         * 键盘按下事件 onkeydown
         *
         * 1. 触发机制：当用户按下键盘上的任意键时触发。
         * 2. 核心属性：
         *    - keyCode：返回按键的 ASCII 码值（数字），用于识别具体按键。
         *    - key：返回按键的标识字符串（如 "Enter", "Shift"）。
         */
        btn.onkeydown = (event) => {
          // 解决兼容性问题
          event = event || window.event

          console.log('--- 键盘事件对象 ---')
          console.log(event)
          console.log('键盘按键被按下了')
          console.log('按键编码 (keyCode):', event.keyCode)
        }

        /**
         * 鼠标移动事件 onmouseover
         *
         * 1. 触发机制：鼠标指针移动到指定的元素（或其子元素）上方时触发。
         * 2. 坐标属性：
         *    - clientX：鼠标相对于浏览器可视区域左上角的水平坐标。
         *    - clientY：鼠标相对于浏览器可视区域左上角的垂直坐标。
         */
        btn.onmouseover = (event) => {
          // 解决兼容性问题
          event = event || window.event

          // 打印鼠标位置
          console.log(`--- 鼠标位置探测 ---`)
          console.log(`鼠标视口坐标: ${event.clientX}, ${event.clientY}`)
        }
      }
    </script>
  </head>
  <body id="body" style="height: 100vh; margin: 0; padding: 20px">
    <h1>按下键盘或移动鼠标触发事件</h1>
    <p>（请点击页面获取焦点后尝试按键，或在页面内移动鼠标）</p>
  </body>
</html>
