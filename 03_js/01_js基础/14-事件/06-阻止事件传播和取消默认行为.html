<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阻止事件传播和取消默认行为</title>
    <style>
      .outer {
        width: 400px;
        height: 400px;
        background-color: gold;
      }
      .inner {
        width: 200px;
        height: 200px;
        background-color: green;
      }
    </style>
    <script>
      /**
       * 事件冒泡机制说明：
       *
       * 1. 基本定义：
       *    - 是指当某个元素上的事件被触发时，该事件会向父级元素传递，直到传递到 document 对象的过程。
       *
       * 2. 触发逻辑：
       *    - 在此过程中，所有绑定在这些父级元素上的相同类型的事件处理程序都会依次被触发。
       *
       * 3. 形象理解：
       *    - 这个传递过程就像气泡从水底逐渐向上升一样，因此被称为 "冒泡"。
       */

      /**
       * 事件流与事件对象处理
       *
       * 1. 事件传播三个阶段 (W3C 标准)：
       *    - 捕获阶段：从最外层的祖先元素向目标元素进行事件捕获，默认此时不会触发事件。
       *    - 目标阶段：事件捕获到目标元素，捕获结束开始在目标元素上触发事件。
       *    - 冒泡阶段：事件从目标元素向它的祖先元素传递，依次触发祖先元素上的事件。
       *
       * 2. 兼容性处理：
       *    - 涵盖了 W3C 标准方法与旧版 IE 浏览器的私有属性。
       */

      /**
       * 获取事件对象
       * 兼容写法：event || window.event
       */
      const getEvent = (event) => {
        return event || window.event
      }

      /**
       * 获取事件目标
       * 兼容写法：target (标准) || srcElement (IE)
       */
      const getTarget = (event) => {
        return event.target || event.srcElement
      }

      /**
       * 阻止事件传播
       *
       * 1. 阻止向上传播：
       *    - event.stopPropagation(): W3C 标准，阻止冒泡但不阻止默认行为。
       *    - event.cancelBubble = true: IE 浏览器使用。
       */
      const stopPropagation = (event) => {
        if (event.stopPropagation) {
          event.stopPropagation()
        } else {
          event.cancelBubble = true
        }
      }

      /**
       * 阻止默认行为
       *
       * 1. 常用场景：
       *    - 阻止超链接跳转、表单提交等。
       *    - event.preventDefault() (标准) / event.returnValue = false (IE)。
       */
      const preventDefault = (event) => {
        if (event.preventDefault) {
          event.preventDefault()
        } else {
          event.returnValue = false
        }
      }

      window.onload = () => {
        // 获取 button 并绑定单击事件
        const button = document.querySelector('button')
        button.addEventListener('click', (event) => {
          alert('button点击事件')
          event = getEvent(event)
          stopPropagation(event) // 触发阻止冒泡

          console.log(getTarget(event))
        })

        // 获取内层盒子并绑定单击事件
        const innerBox = document.querySelector('.inner')
        innerBox.addEventListener('click', () => {
          alert('内层盒子点击事件')
        })

        // 获取外层盒子并绑定单击事件
        const outerBox = document.querySelector('.outer')
        outerBox.addEventListener('click', () => {
          alert('外层盒子点击事件')
        })

        /**
         * 进阶应用：阻止超链接的默认跳转行为
         */
        const goBaidu = document.querySelector('a')
        goBaidu.addEventListener('click', (event) => {
          event = getEvent(event)
          preventDefault(event) // 阻止跳转

          console.log(getTarget(event))
        })
      }
    </script>
  </head>
  <body>
    <div class="outer">
      <div class="inner">
        <button>点击触发事件冒泡</button>
      </div>
    </div>

    <a href="https://www.baidu.com">去百度</a>
  </body>
</html>
