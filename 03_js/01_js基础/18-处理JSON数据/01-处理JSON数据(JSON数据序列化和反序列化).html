<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>处理JSON数据(JSON数据序列化和反序列化)</title>
    <script>
      /**
       * JSON 数据处理指南
       *
       * 1. 核心概念：
       *    - 序列化 (Serialization)：将 JavaScript 对象或数组转换为 JSON 字符串的过程，便于数据传输。
       *    - 反序列化 (Deserialization)：将 JSON 字符串还原为 JavaScript 对象或数组的过程，便于逻辑操作。
       *
       * 2. 常用方法：
       *    - JSON.stringify(data)：执行序列化。
       *    - JSON.parse(string)：执行反序列化。
       *
       * 3. 注意事项：
       *    - JSON 字符串要求属性名必须使用双引号。
       *    - undefined、函数、Symbol 等特殊类型在序列化时会被忽略或转换。
       */

      /**
       * 场景一：处理单个 User 对象
       */
      // 创建一个user对象
      const obj = { id: '001', name: 'zhangsan', age: '20' }

      // 将user对象转换为json字符串(序列化)
      const jsonStr_obj = JSON.stringify(obj)
      console.log(jsonStr_obj)

      // 将json字符串转换为json对象(反序列化)
      const jsonObj_obj = JSON.parse(jsonStr_obj)
      console.log(jsonObj_obj)

      /**
       * 场景二：处理对象数组
       */
      // 创建一个对象数组
      const objArr = [
        { id: '001', name: 'zhangsan', age: '20' },
        { id: '002', name: 'lisi', age: '30' },
      ]

      // 将对象数组转换为json字符串(序列化)
      const jsonStr_arr = JSON.stringify(objArr)
      console.log(jsonStr_arr)

      // 将json字符串转换为json数组(反序列化)
      const jsonObj_arr = JSON.parse(jsonStr_arr)
      console.log(jsonObj_arr)
    </script>
  </head>
  <body></body>
</html>
