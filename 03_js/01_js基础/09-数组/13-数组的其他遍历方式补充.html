<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的其他遍历方式补充</title>
    <script>
      const nums = [10, 20, 30, 40, 50]

      /**
       * 1. 传统 for 循环
       * - 核心：手动控制步长和索引。
       * - 变量：i 是索引（Number 类型）。
       */
      for (let i = 0; i < nums.length; i++) {
        console.log(nums[i])
      }
      console.log('------------01------------')

      /**
       * 2. for...in 遍历
       * - 核心：遍历对象的可枚举属性。
       * - 变量：i 是索引（注意：在 for...in 中索引是 String 类型）。
       */
      for (const i in nums) {
        console.log(nums[i])
      }
      console.log('------------02------------')

      /**
       * 3. for...of 遍历
       * - 核心：基于迭代器（Iterator）接口遍历。
       * - 变量：element 是数组中的每一个【对象/值】。
       */
      for (const element of nums) {
        console.log(element)
      }
      console.log('------------03------------')

      /**
       * 4. Object.keys()
       * - 核心：获取对象自身所有的可枚举键。
       * - 变量：i 是数组中的 key，也就是数组的索引。
       */
      Object.keys(nums).forEach((i) => {
        console.log(nums[i])
      })
      console.log('------------04------------')
    </script>
  </head>
  <body></body>
</html>
