<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目练习-互不影响的计数器组件</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
    <style type="text/css"></style>
  </head>
  <body>
    <div id="app">
      <h3>根实例的数据：{{ rootMessage }}</h3>
      <hr />
      <h3>下面是三个独立的组件，请尝试分别点击它们：</h3>

      <!-- 在页面上复用了 3 次同一个组件，可以看到每个组件的 count 的数据都是独立的 -->
      <counter-button></counter-button>
      <br />
      <br />
      <counter-button></counter-button>
      <br />
      <br />
      <counter-button></counter-button>
    </div>

    <script type="text/javascript">
      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      // 1. 定义一个全局可复用的组件 (注意：组件必须写在 new Vue 之前)
      Vue.component('counter-button', {
        template: '<button v-on:click="count++">我被点击了 {{ count }} 次</button>',
        // 特别注意：如果是组件的 data 必须是函数！它返回一个全新的对象。
        data: function() {
          return {
            count: 0
          }
        }
      })

      // 2. 创建根实例
      new Vue({
        el: '#app',
        // 根实例不复用，所以写成对象完全没问题
        data: {
          rootMessage: '我是根实例（new Vue）中的 data 中的数据'
        }
      })
    </script>
  </body>
</html>
