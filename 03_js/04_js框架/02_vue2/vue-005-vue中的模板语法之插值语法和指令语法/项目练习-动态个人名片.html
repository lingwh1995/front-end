<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目练习-动态个人名片</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
    <style type="text/css">
      .card {
        border: 2px solid #4CAF50;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
        width: 300px;
        background-color: #f9f9f9;
      }

      .box { 
        margin-bottom: 15px;
        padding: 10px;
        background: #eee;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="box">
        <h3>单向数据绑定 (v-bind)</h3>
        姓名：<input type="text" v-bind:value="name" placeholder="请输入姓名">
      </div>
      <div class="box">
        <h3>双向数据绑定 (v-model)</h3>
        姓名：<input type="text" v-model="name" placeholder="请输入姓名">
      </div>
      <div class="card">
        <h3>插值语法 (展示结果)</h3>
        姓名：<span>{{ name }}</span>
        <a v-bind:href="website" target="_blank">跳转到个人主页</a>
      </div>
    </div>

    <script type="text/javascript">
      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      const vm = new Vue({
        el: '#app',
        data: {
          name: '张三',
          website: 'https://www.baidu.com',
        },
      })

      setTimeout(() => {
        vm.name = '王五'
      }, 3000)
    </script>
  </body>
</html>
