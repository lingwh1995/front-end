<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vue的模板语法之插值语法和指令语法入门和对比</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
</head>
<body>
    <div id="app">
        <h1>插值语法</h1>
        <h3>你好， {{name}} !</h3>
        <h1>指令语法</h1>
        <a v-bind:href="url" target="_blank">跳转到百度-原始写法(v-bind:href)</a><br/>
        <a :href="url" target="_blank">跳转到百度-简写(:href)</a>
    </div>

    <script type="text/javascript">
        //验证vue是够被引入，直接打印Vue这个变量
        console.log(Vue)
        //设置为 false 以阻止 vue 在启动时生成生产提示。
        Vue.config.productionTip = false

        /**
         * Vue模板语法有两大类:
         *     1.插值语法: 功能:用于解析标签体内容。
         *          写法: {{xxx}} 是js表达式，且可以直接读取到data中的所有属性。
         *     2.指令语法:
         *          功能: 用于解析标签(包括:标签属性、标签体内容、绑定事件.....)。
         *          举例: v-bind:href="xxx" 或 简写为:href="xxx"，xxx同样要写js表达式，
         *               且可以直接读取到data中的所有属性。
         *          备注: Vue中有很多的指令，且形式都是:v-????，此处我们只是拿v-bind举个例子。 
         * 
         *     一句话简单总结用法：
         *       插值语法和指令语法具体内容都是js表达式，也可以从另一个角度理解：如果是字符串就没有意义了
         */
        //创建vue实例
        new Vue({
            el: '#app',
            data: {
                name: 'zhangsan',
                url: 'https://www.baidu.com'
            },
            methods: {
                funllName() {
                    return '张-三'
                }
            },
        })
    </script>
</body>
</html>
