<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue的模板语法之插值语法和指令语法基础案例</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>插值语法</h1>
      <h3>你好， {{name}} !</h3>
      <h1>指令语法</h1>
      <a v-bind:href="url" target="_blank">跳转到百度-原始写法(v-bind:href)</a>
      <br />
      <a :href="url" target="_blank">跳转到百度-简写(:href)</a>
    </div>

    <script type="text/javascript">
      // 验证vue是够被引入，直接打印Vue这个变量
      console.log(Vue)
      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      /**
       * Vue 模板语法分为两大类：
       * 
       * 1. 插值语法：
       *    功能：用于解析标签体内容。
       *    写法：{{xxx}} 是 JS 表达式，可直接读取 data 中的所有属性。
       * 
       * 2. 指令语法：
       *    功能：用于解析标签（包括：标签属性、标签体内容、绑定事件等）。
       *    举例：v-bind:href="xxx" 或简写为 :href="xxx"，xxx 需写 JS 表达式，
       *         且可直接读取 data 中的所有属性。
       *    备注：Vue 中有很多指令，形式均为 v-xxxx，此处仅以 v-bind 举例。
       * 
       * 一句话总结 Vue 模板语法：
       *    插值语法和指令语法的核心内容都是 JS 表达式（若为纯字符串则无意义）。
       * 案例：给 href 属性值用指令语法，给 标签体 text 设置值用插值语法
       *    <a v-bind:href="url" target="_blank"> {{text}} </a>
       */

      // 创建vue实例
      new Vue({
        el: '#app',
        data: {
          name: 'zhangsan',
          url: 'https://www.baidu.com',
        },
      })
    </script>
  </body>
</html>
