<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基于属性拦截实现数据代理-07-模拟vue中的数据代理实现一个MiniVue</title>
  </head>
  <body>
    <script type="text/javascript">
      class MiniVue {
        constructor(options) {
          // 1. 保存原始数据到 _data (模拟 Vue 内部存储)
          this._data = options.data

          // 2. 开始代理：遍历 data 中的所有 key
          Object.keys(this._data).forEach(key => {
            // 3. 给当前实例 (this) 定义同名属性
            Object.defineProperty(this, key, {
              enumerable: true,
              configurable: true,

              // 当你读取 vm.name 时，实际上去读 vm._data.name
              get() {
                console.log(`代理读取：发现你在找 ${key}，我这就去 _data 里给你取...`)
                return this._data[key]
              },

              // 当你修改 vm.name = 'xxx' 时，实际上修改的是 vm._data.name
              set(newVal) {
                console.log(`代理写入：要把 ${key} 改成 "${newVal}"？好嘞，已同步到 _data`)
                this._data[key] = newVal
              },
            })
          })
        }
      }

      const vm = new MiniVue({
        data: {
          name: 'Gemini',
          age: 1,
        },
      })

      // 触发 get
      console.log('直接访问实例属性:', vm.name)
      // 触发 set
      vm.age = 2
      console.log('验证 _data 是否同步修改:', vm._data.age)
    </script>
  </body>
</html>
