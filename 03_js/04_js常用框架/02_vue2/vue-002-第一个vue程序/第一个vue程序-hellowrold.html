<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第一个vue程序-hellowrold</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
  </head>
  <body>
    <!-- 创建一个根容器 -->
    <div id="app">
      <!-- {{xxx}} 是vue的插值表达式语法 -->
      <h1>{{content}}</h1>
    </div>

    <script type="text/javascript">
      /**
       * Vue.js 核心特性与入门指南
       *
       * 1. 框架特点：
       *    - 组件化模式：提高代码复用率，便于后期维护。
       *    - 声明式编码：无需直接操作 DOM，开发者只需关注数据，提高开发效率。
       *    - 虚拟 DOM + Diff 算法：尽量复用现有 DOM 节点，优化渲染性能。
       *
       * 2. 核心约束：
       *    - 一对一关系：一个 Vue 实例只能对应一个容器。
       *    - 模板机制：容器内的代码被视为 Vue 模板，支持插值表达式等语法。
       *
       * 3. 开发配置：
       *    - productionTip: 设置为 false 可阻止 Vue 在启动时生成生产提示。
       */

      // 验证vue是否被引入，直接打印Vue这个变量
      console.log(Vue)

      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      // 创建vue实例
      const vm = new Vue({
        /**
         * el (Element):
         * 用于指定当前 Vue 实例挂载的容器。
         * 值通常为 CSS 选择器字符串，例如 '#app'。
         */
        el: '#app',

        /**
         * data:
         * 用于存储数据，存储的数据供 el 所指向的容器模板使用。
         */
        data: {
          content: 'hello vue!',
        },
      })

      /**
       * 响应式数据更新示例
       * 逻辑：1秒后自动修改 vm 实例中的属性。
       */
      setTimeout(() => {
        // 方式一：直接修改实例属性（推荐，日常开发首选）
        vm.content = 'hello vue,timeout 1s!'

        /**
         * 方式二：通过 $data 访问（不常用）
         * 仅在需要访问整个数据对象时使用。
         * vm.$data.content = 'hello vue,timeout 1s!'
         */
      }, 1000)
    </script>
  </body>
</html>
