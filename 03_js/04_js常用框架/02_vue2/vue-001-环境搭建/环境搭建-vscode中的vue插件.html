<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>环境搭建-vscode中的vue插件</title>
  </head>
  <body>
    <script type="text/javascript">
      /**
       * VSCode Vue 开发环境搭建指南
       *
       * 1. 核心插件推荐：
       *    - Vue 3 Snippets (作者：hollowtree)
       *      功能：提供 Vue 3 常用的代码片段（Snippets）和智能提示，大幅提升编码效率。
       *    - Vetur (作者：Pine Wu)
       *      功能：Vue 开发的经典全能插件，支持语法高亮、错误检查、代码格式化（Prettier）及 Emmet。
       *
       * 2. 注意事项：
       *    - 对于 Vue 3 项目，官方目前更推荐使用 **Volar** (Vue - Official) 插件以获得更好的 TS 支持。
       *    - 若同时安装 Vetur 和 Volar，建议根据项目版本（Vue 2 或 Vue 3）禁用其中一个以避免冲突。
       *
       * 3. 配套学习资源：
       *    - 详细笔记：https://blog.csdn.net/csdnidofkdy2138/article/details/132140717
       */
    </script>
  </body>
</html>
