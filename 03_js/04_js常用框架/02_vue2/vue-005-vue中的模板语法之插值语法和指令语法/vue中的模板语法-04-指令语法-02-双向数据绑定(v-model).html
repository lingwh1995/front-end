<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue中的模板语法-04-指令语法-02-双向数据绑定(v-model)</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>
        vue的数据动态绑定指令-双向绑定(v-model):vue实例中的data中的数据和页面上的数据会支持一致，修改一个，另一个会发生改变
      </h1>

      <!-- v-model 基础用法与简写 -->
      <h2>
        vue的数据动态绑定指令-双向绑定语法#v-model指令:
        <input type="text" v-model:value="content" />
      </h2>
      <h2>
        vue的数据动态绑定指令-双向绑定语法#v-model指令简写:
        <!-- v-model:value="xxx" 简写为 v-model="xxx" -->
        <input type="text" v-model="content" />
      </h2>

      <!-- v-model 处理方法与复杂表达式 -->
      <h2>
        vue的数据动态绑定指令-双向绑定语法#调用方法:
        <input type="text" v-model:value="url.toUpperCase()" />
      </h2>
      <h2>
        vue的数据动态绑定指令-双向绑定语法#调用方法:
        <input type="text" v-model:value="getUrl()" />
      </h2>
      <h2>
        vue的数据动态绑定指令-双向绑定语法#级联获取值+调用方法:
        <input type="text" v-model:value="school.website.toUpperCase()" />
      </h2>
      <h2>
        vue的数据动态绑定指令-双向绑定语法#拼接值:
        <input type="text" v-model:value="concat.part1 + '-' + concat.part2" />
      </h2>
    </div>

    <script type="text/javascript">
      /**
       * Vue 数据动态绑定指令 - 双向绑定 (v-model) 深度指南
       *
       * 1. 核心定义：
       *    - 双向绑定：数据流向为 "Data <-> View"。
       *    - Data 改变，View 自动更新；View（表单输入）改变，Data 也会同步修改。
       *
       * 2. 应用规则：
       *    - 适用范围：仅限“表单类”交互元素（如 input, select, textarea 等）。
       *    - 简写方式：`v-model:value="xxx"` 可直接简写为 `v-model="xxx"`，因为 v-model 默认收集的就是 value 属性。
       *
       * 3. 核心原理与注意：
       *    - 本质：它是 `v-bind:value` 和 `v-on:input` 的语法糖。
       *    - 特殊场景：用于单选/多选框时，必须在 HTML 标签中显式配置 `value` 属性，否则 v-model 无法正确收集。
       */

      // 验证vue是否被引入
      console.log(Vue)

      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      // 创建vue实例
      new Vue({
        el: '#app',
        data: {
          content: '测试双向数据绑定~',
          url: 'https://www.baidu.com',
          school: {
            website: 'http://www.xaufe.edu.cn/',
          },
          concat: {
            part1: '第一部分',
            part2: '第二部分',
          },
        },
        methods: {
          getUrl() {
            return this.url
          },
        },
      })
    </script>
  </body>
</html>
