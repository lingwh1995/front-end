<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目练习-互不影响的计数器组件</title>
    <!-- 引入vue -->
    <script type="text/javascript" src="../vue.js"></script>
    <style type="text/css"></style>
  </head>
  <body>
    <div id="app">
      <h3>根实例的数据：{{ rootMessage }}</h3>
      <hr />
      <h3>下面是三个独立的组件，请尝试分别点击它们：</h3>

      <!-- 
           组件复用演示：
           在页面上复用了 3 次同一个组件，可以看到每个组件的 count 的数据都是独立的。
      -->
      <counter-button></counter-button>
      <br />
      <br />
      <counter-button></counter-button>
      <br />
      <br />
      <counter-button></counter-button>
    </div>

    <script type="text/javascript">
      /**
       * Vue 组件化开发 - 独立计数器练习
       *
       * 1. 实现目的：
       *    - 演示 Vue 组件的复用性。
       *    - 验证每个组件实例维护一份独立的数据拷贝。
       *
       * 2. 核心原理（data 必须为函数）：
       *    - 每次使用组件时，Vue 都会调用一次 data 函数。
       *    - 该函数返回一个全新的对象作为该组件实例的私有数据，从而保证互不干扰。
       *
       * 3. 注意事项：
       *    - 组件注册必须在根实例（new Vue）挂载之前完成。
       *    - 根实例由于不涉及复用，其 data 既可以写成对象，也可以写成函数。
       */

      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      /**
       * 1. 定义一个全局可复用的组件
       * 注意：组件名建议使用短横线命名法（kebab-case）
       */
      Vue.component('counter-button', {
        // 组件的 HTML 模板
        template: '<button v-on:click="count++">我被点击了 {{ count }} 次</button>',

        /**
         * 特别注意：组件的 data 必须是函数！
         * 逻辑：它返回一个全新的对象，确保每个组件实例拥有独立的作用域。
         */
        data: function () {
          return {
            count: 0,
          }
        },
      })

      /**
       * 2. 创建根实例
       * 功能：作为所有组件的父容器，管理全局状态。
       */
      new Vue({
        el: '#app',
        /**
         * 根实例不复用，所以 data 写成对象完全没问题。
         */
        data: {
          rootMessage: '我是根实例（new Vue）中的 data 中的数据',
        },
      })
    </script>
  </body>
</html>
