<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>script标签</title>
    <script type="text/javascript">
      /**
       * JS 的 <script> 标签详细说明
       *
       * 1. JS 代码需要编写在 <script> 标签中。
       *
       * 2. 位置：
       *    一般写在 <head> 中，也可以写在 <body> 中或其他位置。
       *
       * 3. <script> 标签有两个核心属性：
       *    - type：默认值为 "text/javascript"，通常可以省略不写。
       *    - src ：当需要引入外部 JS 文件时，使用该属性指向文件的地址。
       */
    </script>
  </head>
  <body></body>
</html>
