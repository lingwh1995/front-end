<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语言特点和语法特点</title>
    <script type="text/javascript">
      /**
       * JS 的语言特点
       *
       * 1. 解释型语言
       *    JavaScript 是一门解释型语言，所谓解释型语言不需要被编译为机器码再执行，而是直接执行。
       *    由于少了编译这一步骤，所以解释型语言开发起来尤为轻松，但是运行较慢也是它的劣势。
       *    不过解释型语言中使用了 JIT 技术，使得运行速度得以改善。
       *
       * 2. 类似于 C 和 Java 的语法结构
       *
       * 3. JS 是动态语言
       *    - 动态类型语言：在运行期进行类型检查的语言，也就是在编写代码的时候可以不指定变量的数据类型，
       *      常见的语言如 JavaScript、Python。
       *    - 静态类型语言：它的数据类型是在编译期进行检查的，变量在使用前要声明变量的数据类型。
       *      好处在于把类型检查放在编译期，提前检查可能出现的类型错误，常见的静态语言有 C/C++ 和 Java。
       *
       * 4. 基于原型的面向对象（基于原型实现面向对象）
       *
       * ---------------------------------------------------------
       *
       * JS 的语法特点
       *
       * 1. 严格区分大小写
       * 2. 推荐使用单引号而不是双引号
       */
    </script>
  </head>
  <body></body>
</html>
