<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分支语句-switch-case语句语法</title>
    <script type="text/javascript">
      /**
       * switch...case 语句注意事项
       *
       * 1. 嵌套机制：
       *    - switch...case... 语句支持相互嵌套，用于处理更复杂的逻辑分支。
       *
       * 2. 匹配规则：
       *    - case 处不会进行隐式类型转换。
       *    - 其内部执行的是严格相等比较 (===)，即要求“值”与“类型”必须完全一致。
       */

      // switch...case...
      switch (a) {
        case 1:
          console.log('a的值等于1')
          break
        case 2:
          console.log('a的值等于2')
          break
        case 5:
          console.log('a的值等于5')
          break
        default:
          console.log('a的值等于其他')
          break
      }
    </script>
  </head>
  <body></body>
</html>
