<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>处理JSON数据(JSON数据序列化和反序列化)兼容IE等浏览器</title>
    <!-- 引入兼容性库 -->
    <script src="./json3.min.js"></script>
    <script>
      /**
       * JSON 兼容性处理指南 (JSON 3)
       *
       * 1. 库文件说明：
       *    - JSON 3 是一个现代 JSON 实现，旨在解决旧版浏览器对标准 JSON 对象支持不足的问题。
       *
       * 2. 兼容性范围：
       *    - 支持 Internet Explorer 6+、Opera 7+、Safari 2+ 及 Netscape 6+ 等。
       *    - 当前使用的版本参考为 3.3.2。
       *
       * 3. 核心功能：
       *    - 在不支持原生 JSON 对象的环境中提供标准的 JSON.stringify 和 JSON.parse 方法。
       */

      /**
       * 场景一：处理单个 User 对象
       *
       * 步骤：
       * - 1. 定义 JavaScript 对象。
       * - 2. 执行序列化 (stringify)。
       * - 3. 执行反序列化 (parse)。
       */
      // 创建一个user对象
      const obj = { id: '001', name: 'zhangsan', age: '20' }

      // 将user对象转换为json字符串
      const jsonObjToStr = JSON.stringify(obj)
      console.log(jsonObjToStr)

      // 将json字符串转换为json对象
      const jsonStrToObj = JSON.parse(jsonObjToStr)
      console.log(jsonStrToObj)

      /**
       * 场景二：处理对象数组
       *
       * 步骤：
       * - 1. 定义 JavaScript 数组对象。
       * - 2. 将数组序列化为字符串，便于跨平台传输。
       * - 3. 将字符串还原为 JSON 数组对象。
       */
      // 创建一个对象数组
      const arrObj = [
        { id: '001', name: 'zhangsan', age: '20' },
        { id: '002', name: 'lisi', age: '30' },
      ]

      // 将数组对象转换为json字符串
      const jsonArrObjToArrStr = JSON.stringify(arrObj)
      console.log(jsonArrObjToArrStr)

      // 将json字符串转换为json数组
      const jsonArrStrToObj = JSON.parse(jsonArrObjToArrStr)
      console.log(jsonArrStrToObj)
    </script>
  </head>
  <body></body>
</html>
