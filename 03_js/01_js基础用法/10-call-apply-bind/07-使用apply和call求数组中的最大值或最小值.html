<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>使用 apply 和 call 求数组中的最大值或最小值</title>
    <script>
      /**
       * 利用 Math.max 与 apply 处理数组
       *
       * 1. 核心原理：Math.max 不接受数组作为参数，只接受一组数值列表。
       * 2. 解决方案：使用 apply 可以将数组自动展开，作为参数序列传递给函数。
       * 3. 上下文绑定：此处第一个参数传 Math 或 null 均可，因为 max 不需要依赖特定的 this。
       */
      const nums = [1, 3, 5, 7, 9]
      const maxNum = Math.max.apply(Math, nums)
      console.log('最大值:', maxNum)
      console.log('----------01----------')

      /**
       * 利用 Math.min 与 call 处理数值列表
       *
       * 1. 核心原理：call 接收的是以逗号分隔的参数列表。
       * 2. 适用场景：当参数已经是独立的数值而非数组时，使用 call 更加直接。
       * 3. 对比：如果参数在数组里，用 apply；如果参数是分散的，用 call。
       */
      const minNum = Math.min.call(Math, 1, 3, 5, 7, 9)
      console.log('最小值:', minNum)
      console.log('----------02----------')
    </script>
  </head>
  <body></body>
</html>
