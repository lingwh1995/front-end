<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>给dom绑定事件的四种方法</title>
    <script>
      window.onload = () => {
        /**
         * ------------------------------------------
         * 绑定方式一：DOM 0级事件绑定 (属性赋值法)
         * 特点：简单方便，但同一个事件只能绑定一个处理函数，后面的会覆盖前面的。
         * ------------------------------------------
         */
        const btn1 = document.getElementById('btn-1')
        btn1.onclick = () => {
          alert('绑定事件方式一')
        }

        /**
         * ------------------------------------------
         * 绑定方式二：DOM 2级事件绑定 (标准监听法)
         * 特点：现代浏览器标准，支持为一个事件绑定多个监听器。
         * ------------------------------------------
         */
        const btn2 = document.getElementById('btn-2')
        btn2.addEventListener('click', () => {
          alert('绑定事件方式二')
        })

        /**
         * ------------------------------------------
         * 绑定方式三：兼容性封装 (跨浏览器方案)
         * 技术要点：
         * 1. addEventListener: W3C 标准（IE9+）。
         * 2. attachEvent: 老版 IE 私有方法（IE8 及以下）。
         * 3. 捕获与冒泡：第三个参数 true 为捕获，false 为冒泡（默认）。
         * ------------------------------------------
         */

        // 兼容性绑定函数
        const addEventListenerCompatible = (element, eventType, fnName) => {
          if (element.addEventListener) {
            element.addEventListener(eventType, fnName, false)
          } else if (element.attachEvent) {
            element.attachEvent('on' + eventType, fnName)
          } else {
            element['on' + eventType] = fnName
          }
        }

        // 兼容性解绑函数
        const removeEventListenerCompatible = (element, eventType, fnName) => {
          if (element.removeEventListener) {
            element.removeEventListener(eventType, fnName, false)
          } else if (element.detachEvent) {
            element.detachEvent('on' + eventType, fnName)
          } else {
            element['on' + eventType] = null
          }
        }

        // 执行绑定示例
        const bindBtn = document.getElementById('btn-3-bind')
        const bindFun = () => {
          alert('绑定事件方式三：为元素绑定事件兼容性代码')
        }
        addEventListenerCompatible(bindBtn, 'click', bindFun)

        // 执行解绑示例
        const unbindBtn = document.getElementById('btn-3-unbind')
        const unBindFun = () => {
          alert('绑定事件方式三：为元素解绑事件兼容性代码')
        }
        removeEventListenerCompatible(unbindBtn, 'click', unBindFun)
      }

      /**
       * ------------------------------------------
       * 绑定方式四：行内事件绑定 (Inline Handler)
       * 特点：HTML 与 JS 耦合度高，不建议在大型项目中使用。
       * ------------------------------------------
       */
      const bindEvent = () => {
        alert('绑定事件方式四')
      }
    </script>
  </head>
  <body>
    <button id="btn-1">绑定事件方式一</button>
    <br />
    <button id="btn-2">绑定事件方式二</button>
    <br />
    <button id="btn-3-bind">绑定事件方式三：为元素绑定事件兼容性代码</button>
    <br />
    <button id="btn-3-unbind">绑定事件方式三：为元素解绑事件兼容性代码</button>
    <br />
    <button onclick="bindEvent()">绑定事件方式四</button>
    <br />
  </body>
</html>
