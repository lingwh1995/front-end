<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>onload 事件增强</title>
    <script>
      /**
       * window.onload 的基本定义
       *
       * 1. 触发时机：在整个 HTML 结构、外部 CSS、图片及脚本全部加载完成后触发。
       * 2. 核心用途：确保在执行 JS 逻辑时，DOM 元素已经存在。
       */
      window.onload = () => {
        alert('页面加载完成了')
      }

      /**
       * 作用域与加载顺序解析
       *
       * 为什么把 bindEvent 写在 window.onload 回调函数内部会导致按钮点击报错？
       *
       * 1. 生命周期限制：window.onload 回调内的代码在页面“骨架”加载完成前不会执行。
       * 2. 解析顺序：HTML 从上往下解析到 <input> 时，浏览器会寻找全局作用域下的 bindEvent。
       *    - 若 bindEvent 在 onload 内部定义，它属于“局部函数”，外部无法访问。
       *    - 若 bindEvent 在外部定义（如下方代码），解析阶段即存在，故可被正常调用。
       *
       * 3. 最佳实践建议：
       *    - 如果不使用 onload 包装，建议将 <script> 标签放在页面底部（</body> 前）。
       */
      const bindEvent = () => {
        alert('我是弹窗~')
      }
    </script>
  </head>
  <body>
    <input type="button" onclick="bindEvent()" value="点我弹窗" />
  </body>
</html>
