<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>判断数组元素是否符合条件的方法</title>
    <script type="text/javascript">
      const nums = [10, 20, 30, 40, 50]
      console.log(nums)
      console.log('------------01------------')

      /**
       * 1. every() —— 【全真才真】
       * - 功能：测试数组内的【所有】元素是否都能通过指定函数的测试。
       * - 返回：Boolean。
       */
      console.log(
        nums.every((element) => {
          return element > 30
        })
      )
      console.log('------------02------------')

      /**
       * 2. some() —— 【一真即真】
       * - 功能：测试数组中是否【至少有一个】元素通过了指定函数的测试。
       * - 特点：只要找到一个匹配项就返回 true，且不会修改原数组。
       * - 返回：Boolean。
       */
      console.log(
        nums.some((element) => {
          return element > 30
        })
      )
      console.log('------------03------------')

      /**
       * 3. includes() —— 【简单包含】
       * - 功能：判断数组是否包含一个【指定的值】。
       * - 返回：Boolean。
       */
      console.log(nums.includes(10))
      console.log('------------04------------')
    </script>
  </head>
  <body></body>
</html>
