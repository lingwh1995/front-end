<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的常用方法</title>
    <script type="text/javascript">
      /**
       * 1. Array.isArray()
       * - 功能：用于确定传递的值是否是一个数组。
       * - 注意：字符串形式的 '[]' 或 TypedArray（如 Int16Array）会返回 false。
       */
      console.log(Array.isArray([1, 3, 5]))
      console.log(Array.isArray('[]'))
      console.log(Array.isArray(new Array(5)))
      console.log(Array.isArray(new Int16Array([15, 33])))
      console.log('------------01------------')

      /**
       * 2. concat()
       * - 功能：用于合并两个或多个数组。
       * - 特点：【非破坏性】，不会更改现有数组，而是返回一个新数组。
       */
      let nums = [1, 2, 3, 4, 5]
      const colos = ['RED', 'GREEN', 'BLUE']
      console.log(nums.concat(colos))
      console.log('------------02------------')

      /**
       * 3. copyWithin()
       * - 功能：浅复制数组的一部分到同一数组中的另一个位置。
       * - 特点：【就地修改】，不会改变原数组的长度。
       * - 语法：copyWithin(target, start, end)
       */
      const letters = ['a', 'b', 'c', 'd', 'e']
      // 复制数组示例
      console.log(letters.copyWithin(0))
      console.log('------------03------------')

      /**
       * 4. fill()
       * - 功能：用一个固定值填充数组的指定范围。
       * - 范围：[start, end)，默认为全覆盖。
       * - 语法：fill(value, start, end)
       */
      const arr = new Array(5)
      console.log(arr.fill('a', 2, 4))
      console.log('------------04------------')

      /**
       * 5. reverse() vs toReversed()
       * - reverse()    : 【就地反转】，修改原数组，返回引用。
       * - toReversed() : 【复制版本】，返回顺序相反的新数组，不修改原数组。
       */
      nums = [1, 2, 3, 4, 5]
      console.log(nums.reverse()) // 修改原数组

      nums = [1, 2, 3, 4, 5]
      console.log(nums.toReversed()) // 返回新数组
      console.log('------------05 & 06------------')

      /**
       * 6. sort() vs toSorted()
       * - sort()     : 【就地排序】，默认按 UTF-16 码元值升序。
       * - toSorted() : 【复制版本】，返回排序后的新数组。
       */
      nums = [1, 3, 2, 4, 5]
      console.log(nums.sort())

      nums = [1, 3, 2, 4, 5]
      console.log(nums.toSorted())
      console.log('------------07 & 08------------')

      /**
       * 7. toString()
       * - 功能：返回表示数组元素的字符串，元素间默认以逗号隔开。
       */
      nums = [1, 2, 3, 4, 5]
      console.log(nums.toString())
      console.log('------------08------------')

      /**
       * 8. with() [ES2023]
       * - 功能：返回一个指定索引处值被替换后的新数组。
       * - 特点：【非破坏性】，原数组保持不变。
       */
      nums = [1, 2, 3, 4, 5]
      console.log(nums.with(2, 6))
      console.log(nums)
      console.log('------------09------------')
    </script>
  </head>
  <body></body>
</html>
