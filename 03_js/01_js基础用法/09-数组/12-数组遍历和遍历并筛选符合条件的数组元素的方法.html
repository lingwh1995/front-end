<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组遍历与筛选方法</title>
    <script type="text/javascript">
      const nums = [10, 20, 30, 40, 50]
      console.log(nums)
      console.log('------------01------------')

      /**
       * 1. forEach() —— 【直接遍历】
       * - 功能：遍历数组中的每个元素。
       * - 语法：
       *   - forEach(element)
       *   - forEach(element, index)
       */
      nums.forEach((element) => {
        console.log(element)
      })
      console.log('------------02------------')

      /**
       * 2. keys() —— 【索引迭代器】
       * - 功能：返回一个新的数组迭代器对象，包含数组中每个索引的键。
       */
      const keys = nums.keys()
      // 注意：迭代器通常配合 for...of 或 Array.from 使用
      for (const key of keys) {
        console.log(key, nums[key])
      }
      console.log('------------03------------')

      /**
       * 3. values() —— 【数值迭代器】
       * - 功能：返回一个新的数组迭代器对象，迭代数组中每个元素的值。
       */
      const values = nums.values()
      for (const value of values) {
        console.log(value)
      }
      console.log('------------04------------')

      /**
       * 4. entries() —— 【键值对迭代器】
       * - 功能：返回一个新的数组迭代器对象，包含数组中每个索引的键/值对 [index, value]。
       */
      const entries = nums.entries()
      for (const entry of entries) {
        console.log(entry[0], entry[1])
      }
      console.log('------------05------------')

      /**
       * 5. filter() —— 【过滤筛选】
       * - 功能：遍历数组并筛选出符合条件的元素。
       * - 结果：返回一个包含所有通过测试元素的新数组。
       * - 语法：
       *   - filter(element)
       *   - filter(element, index)
       */
      const numsFilter = nums.filter((num) => {
        return num > 30
      })
      console.log(numsFilter)
      console.log('------------06------------')

      /**
       * 6. map() —— 【映射转换】
       * - 功能：创建一个新数组，由原数组每个元素执行回调后的返回值组成。
       * - 特点：【非破坏性】，不改变原数组。
       */
      console.log(nums.map((num) => num * 2))
      console.log('------------07------------')

      /**
       * 7. for...of —— 【通用遍历】
       * - 特点：只要数组内实现了 Iterator 接口，就可以直接使用。
       * - 优势：语义清晰，支持 break/continue。
       */
      for (const num of nums) {
        console.log(num)
      }
      console.log('------------08------------')
    </script>
  </head>
  <body></body>
</html>
