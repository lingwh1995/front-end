<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的 slice 和 splice 方法</title>
    <script type="text/javascript">
      let nums = [10, 20, 30, 40, 50]
      console.log(nums)
      console.log('------------01------------')

      /**
       * slice() —— 【提取】
       *
       * 1. 基本特性：
       *    - 返回一个由 start 和 end 决定的原数组的浅拷贝（左闭右开：包含 start，不包含 end）。
       *    - 重要：【原始数组不会被改变】。
       *
       * 2. 语法参考：
       *    - slice()              : 不传参表示返回数组中的所有元素（常用于复制数组）。
       *    - slice(start)         : 从 start 开始截取到末尾。
       *    - slice(start, end)    : 从 start 开始截取到 end 之前。
       */
      console.log(nums.slice(2))
      console.log(nums)
      console.log('------------02------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.slice(2, 3))
      console.log(nums)
      console.log('------------03------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.slice(2, -1))
      console.log(nums)
      console.log('------------04------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.slice(-2))
      console.log(nums)
      console.log('------------05------------')

      /* 使用 slice() 将原数组复制到一个新的数组中 */
      nums = [10, 20, 30, 40, 50]
      console.log(nums.slice())
      console.log(nums)
      console.log('------------06------------')

      /**
       * splice() —— 【修改/替换】
       *
       * 1. 基本特性：
       *    - 在原数组中移除、替换或添加新元素。
       *    - 重要：【会改变原数组的内容】。
       *
       * 2. 语法参考：
       *    - splice(start)
       *      -> 从 start 位置开始截取，返回被截取的元素。
       *    - splice(start, deleteCount)
       *      -> 从 start 开始截取指定个数，返回被截取的元素。
       *    - splice(start, deleteCount, item1, item2, ...)
       *      -> 截取后并在该位置插入新元素，返回被截取的元素。
       */
      nums = [10, 20, 30, 40, 50]
      console.log(nums.splice(1))
      console.log(nums)
      console.log('------------07------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.splice(1, 2))
      console.log(nums)
      console.log('------------08------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.splice(1, 2, 'XXX'))
      console.log(nums)
      console.log('------------09------------')

      nums = [10, 20, 30, 40, 50]
      console.log(nums.splice(1, 2, 'XXX', 'YYY'))
      console.log(nums)
      console.log('------------10------------')

      /* 使用 splice() 清空原数组 */
      nums = [10, 20, 30, 40, 50]
      console.log(nums.splice(0))
      console.log(nums)
      console.log('------------11------------')
    </script>
  </head>
  <body></body>
</html>
