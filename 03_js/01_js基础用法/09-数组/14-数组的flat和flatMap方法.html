<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的 flat 和 flatMap 方法</title>
    <script type="text/javascript">
      let nums = [10, 20, [30, 40], 50]

      /**
       * 1. flat() —— 【数组扁平化】
       *
       * - 功能：创建一个新数组，并根据指定深度递归地将所有子数组元素拼接到新数组中。
       * - 语法：
       *    - flat()       : 默认深度为 1。
       *    - flat(depth)  : 指定嵌套数组被展开的深度。
       */
      console.log(nums.flat()) // [10, 20, 30, 40, 50]

      nums = [10, [[20, [30, 40]], 50]]
      console.log(nums.flat()) // 默认深度 1: [10, [20, [30, 40]], 50]
      console.log(nums.flat(2)) // 深度 2: [10, 20, [30, 40], 50]
      console.log(nums.flat(3)) // 深度 3: [10, 20, 30, 40, 50]
      console.log('------------01------------')

      /**
       * 2. flatMap() —— 【映射并扁平化】
       *
       * - 基本功能：
       *    - 对数组中每个元素应用回调函数，然后将结果【展开一级】，返回新数组。
       *
       * - 逻辑等价性：
       *    - 等价于调用 map() 后再调用深度为 1 的 flat()。
       *    - 公式：arr.flatMap(...) ≡ arr.map(...).flat(1)
       *
       * - 性能优势：
       *    - 在单次遍历中完成映射和拍平，比分别调用 map() 和 flat() 更高效。
       */
      nums = [10, 20, 30, 40, 50]
      // 场景：将元素 20 展开为两个 20，其他保持不变
      console.log(nums.flatMap((element) => (element === 20 ? [20, 20] : element)))
      console.log('------------02------------')
    </script>
  </head>
  <body></body>
</html>
