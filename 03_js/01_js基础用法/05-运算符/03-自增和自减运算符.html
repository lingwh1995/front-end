<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自增和自减运算符</title>
    <script type="text/javascript">
      /**
       * 自增和自减运算符
       *
       * 1. ++i (前置自增)
       *    - 先加后用：先对变量进行自增，然后再使用自增后的值进行运算。
       *
       * 2. i++ (后置自增)
       *    - 先用后加：先使用变量当前的值进行运算，然后再对变量进行自增。
       */
    </script>
  </head>
  <body></body>
</html>
