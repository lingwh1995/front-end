<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <title>关系运算符</title>
    <script type="text/javascript">
      /**
       * 1. 关系运算符概述
       *    - 通过关系运算符可以比较两个值之间的大小关系。
       *    - 如果关系成立返回 true，不成立则返回 false。
       *
       *    符号列表：
       *    >   大于
       *    <   小于
       *    >=  大于等于
       *    <=  小于等于
       *    ==  相等（仅比较字面量）
       *    === 全等（严格相等，比较值和类型）
       *
       * 2. 非数值情况下的比较规则
       *    - 基本规则：将其转换为数字然后再比较。
       *    - 特殊情况：如果符号两侧的值【都是字符串】时，不会将其转换为数字，而是比较其 Unicode 编码。
       *
       * 3. == 与 === 的深度区别
       *    - 相等运算符 (==)：
       *      - 在比较之前会自动转换数据类型（隐式转换），允许不同类型的值进行比较。
       *      - 核心：只要“字面量”相等即可。
       *    - 全等运算符 (===)：
       *      - 进行严格相等比较，不进行类型转换。
       *      - 核心：必须“值”和“类型”完全相同才返回 true，否则返回 false。
       */
      console.log(1 == '1')
      console.log(1 === '1')

      console.log(NaN == NaN)
      console.log(NaN === NaN)

      console.log(null == undefined)
      console.log(null === undefined)

      console.log(false == 0)
      console.log(false == '0')
      console.log(false === 0)
      console.log(false === '0')
    </script>
  </head>
  <body></body>
</html>
