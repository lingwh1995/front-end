<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>算术运算符与数据类型转换</title>
    <script type="text/javascript">
      /**
       * 算数运算符
       *
       * 说明：
       *  - 当对非 Number 类型的值进行运算时，会将这些值转换为 Number 然后再运算。
       *  - 任何值和 NaN 做运算，结果都为 NaN。
       *
       * 运算符详解：
       *  + (加法)
       *      1. 可以对两个值进行加法运算，并将结果返回。
       *      2. 对两个字符串进行加法运算，则会做拼串，将两个字符串拼接为一个字符串并返回。
       *      3. 任何的值和字符串做加法运算，都会先转换为字符串，然后再进行拼串操作。
       *
       *  - (减法)
       *      - 可以对两个值进行减法运算，并将结果返回。
       *
       *  * (乘法)
       *      - 可以对两个值进行乘法运算。
       *
       *  / (除法)
       *      - 可以对两个值进行除法运算。
       *
       *  % (取模)
       *      - 取模运算（获取余数）。
       */

      /**
       * 隐式类型转换：String 转换
       *
       * 1. 核心原理：
       *    任何值和字符串相加都会转换为字符串，并做拼串操作。
       *
       * 2. 应用技巧：
       *    我们可以利用这一特点，将任意的数据类型转换为 String。
       *    只需为任意的数据类型 + 一个 "" (空串) 即可将其转换为 String。
       *
       * 3. 底层逻辑：
       *    这是一种隐式的类型转换，由浏览器自动完成。
       *    实际上它也是调用 String() 函数。
       */
      let a = 'hello'
      a = 123 + a
      console.log(typeof a)
      console.log(a)

      /**
       * 隐式类型转换：Number 转换
       *
       * 1. 核心特性：
       *    任何值做 -、*、/ 运算时都会自动转换为 Number。
       *
       * 2. 应用技巧：
       *    我们可以利用这一特点做隐式的类型转换。
       *    可以通过为一个值 -0、*1 或 /1 来将其转换为 Number。
       *
       * 3. 实现原理：
       *    原理和 Number() 函数一样，但使用起来更加简单。
       */
      let b = '123'
      b = b - 0
      console.log(typeof b)
      console.log(b)
    </script>
  </head>
  <body></body>
</html>
