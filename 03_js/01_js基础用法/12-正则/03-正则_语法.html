<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正则_语法速查</title>
    <script>
      /**
       * 正则表达式语法核心指南
       *
       * 1. 基础匹配与逻辑
       * - /ab/      : 普通字符直接写，表示 a 和 b 必须紧邻且顺序不变。
       * - |         : 表示“或”逻辑。/abc|bcd/ 匹配 abc 或 bcd（符号前后视为整体）。
       * - [ ]       : 字符集，表示匹配集合中的任意一个字符。
       * - [ab]      : 匹配 a 或 b。
       * - [a-z]     : 匹配任意小写字母。
       * - [A-Z]     : 匹配任意大写字母。
       * - [a-zA-Z]  : 匹配任意字母（等价于 /[a-z]/i）。
       * - [0-9]     : 匹配任意数字。
       * - [^a-z]    : 排除集，表示匹配除了小写字母以外的任何字符。
       *
       * 2. 元字符 (简写模式)
       * - .         : 匹配除换行符（\n, \r）以外的任意字符。
       * - \w        : 单词字符，等价于 [A-Za-z0-9_]。
       * - \W        : 非单词字符，等价于 [^A-Za-z0-9_]。
       * - \d        : 任意数字，等价于 [0-9]。
       * - \D        : 非数字，等价于 [^0-9]。
       * - \s        : 匹配空格（含制表符、换页符等）。
       * - \S        : 匹配非空格字符。
       * - \.        : 转义字符，表示匹配点号本身。
       *
       * 3. 边界符
       * - \b        : 单词边界（如匹配 "child" 而不匹配 "children" 中的 child 部分）。
       * - \B        : 非单词边界。
       * - ^         : 匹配字符串的开头。
       * - $         : 匹配字符串的结尾。
       *
       * 4. 量词 (控制出现次数)
       * - {m}       : 正好出现 m 次。
       * - {m,}      : 至少出现 m 次。
       * - {m,n}     : 出现 m 到 n 次。
       * - +         : 出现 1 次或多次，相当于 {1,}。
       * - *         : 出现 0 次或多次（有无均可），相当于 {0,}。
       * - ?         : 出现 0 次或 1 次，相当于 {0,1}。
       */

      // 测试字符集与转义
      let pattern = /a[bc\.]d/
      console.log(pattern.test('abd')) // true
      console.log(pattern.test('acd')) // true
      console.log(pattern.test('a.d')) // true

      // 测试单词边界
      pattern = /\bchild\b/ // 增加边界符确保精确匹配单词
      console.log(pattern.test('hello child')) // true
      console.log(pattern.test('children')) // false
    </script>
  </head>
  <body>
    <h1>查看控制台了解正则校验结果</h1>
  </body>
</html>
