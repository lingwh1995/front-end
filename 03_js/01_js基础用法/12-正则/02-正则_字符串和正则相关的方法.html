<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正则_字符串和正则相关的方法</title>
    <script>
      const str = '1a2b3c4d5E6F'

      /**
       * split() 方法
       *
       * 1. 功能：根据正则表达式定义的规则将字符串拆分成数组。
       * 2. 优势：相比传入固定字符串，正则拆分可以同时匹配多种分隔符（如同时按字母、逗号、空格拆分）。
       */
      console.log(str.split(/[a-z]/))

      /**
       * search() 方法
       *
       * 1. 功能：查找符合正则表达式条件的字符首次出现的索引位置。
       * 2. 特点：如果匹配成功则返回索引，失败则返回 -1。
       * 3. 局限：即便使用了全局匹配修饰符 g，它也只会返回第一个匹配的位置。
       */
      console.log(str.search(/[a-z]/))

      /**
       * match() 方法
       *
       * 1. 功能：根据正则表达式从字符串中提取符合条件的内容。
       * 2. 返回值：将匹配结果封装成数组返回。
       * 3. 核心：配合全局修饰符 g 使用，可以一次性抓取字符串中所有符合要求的片段。
       */
      console.log(str.match(/[a-z]/gi))

      /**
       * replace() 方法
       *
       * 1. 功能：根据正则表达式从字符串中寻找符合条件的内容并替换。
       * 2. 参数：参数一为正则规则，参数二为替换后的新字符。
       * 3. 应用场景：常用于敏感词屏蔽或字符批量替换。
       */
      console.log(str.replace(/[a-z]/gi, '-'))
    </script>
  </head>
  <body></body>
</html>
