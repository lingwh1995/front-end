<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常用bom对象_window对象_内置对象location</title>
    <script>
      /**
       * Location 对象核心指南
       *
       * 1. 基本定义：
       *    - location 对象中封装了浏览器的地址栏的信息。
       *    - 直接打印 location，可以获取到地址栏的信息（当前页面的完整路径）。
       *
       * 2. 使用方式：
       *    - location 是 window 的内置对象，可以直接使用，也可以通过 window.location 使用。
       *
       * 3. 主要功能：
       *    - 解析 URL 组件（协议、主机、路径、参数等）。
       *    - 页面跳转与刷新控制。
       */
      window.onload = () => {
        /**
         * 场景一：打印 location 对象常用属性
         *
         * 常用属性说明：
         * - href: 完整路径
         * - origin: 源（协议+主机+端口）
         * - protocol: 协议 (http:/https:)
         * - hostname: 主机名
         * - host: 主机 (包含端口)
         * - port: 端口号
         * - pathname: 路径部分
         * - search: ? 后边的参数部分
         */
        document.querySelectorAll('button')[0].addEventListener('click', () => {
          console.log(location)
          console.log(location.href)
          console.log(location.origin)
          console.log(location.protocol)
          console.log(location.hostname)
          console.log(location.host)
          console.log(location.port)
          console.log(location.pathname)
          console.log(location.search)
        })

        /**
         * 场景二：修改 location 中地址
         * 特点：直接赋值字符串会导致浏览器立即跳转到新地址，并生成历史记录。
         */
        document.querySelectorAll('button')[1].addEventListener('click', () => {
          location = 'https://www.baidu.com'
          //location.href = 'https://www.baidu.com'
        })

        /**
         * 方式三：assign() 方法
         * 功能：用来跳转到其它的页面，作用和直接修改 location 一样。
         */
        document.querySelectorAll('button')[2].addEventListener('click', () => {
          location.assign('https://www.baidu.com')
        })

        /**
         * 方式四：reload() 方法
         * 功能：用于重新加载当前页面，作用和刷新按钮一样。
         */
        document.querySelectorAll('button')[3].addEventListener('click', () => {
          location.reload()
        })

        /**
         * 方式五：reload(true) 强制刷新
         * 功能：重新加载当前页面。如果在方法中传递一个 true 作为参数，则会强制清空缓存刷新页面。
         */
        document.querySelectorAll('button')[4].addEventListener('click', () => {
          location.reload(true)
        })

        /**
         * 方式六：replace() 方法
         * 功能：使用一个新的页面替换当前页面。
         * 注意：调用完毕也会跳转页面，但它【不会生成历史记录】，不能使用回退按钮回退。
         */
        document.querySelectorAll('button')[5].addEventListener('click', () => {
          location.replace('https://www.baidu.com')
        })
      }
    </script>
  </head>
  <body>
    <button>打印location对象常用属性</button>
    <button>修改location中地址</button>
    <button>使用location.assign()实现页面跳转</button>
    <button>使用location.reload()实现重新载入页面</button>
    <br />
    <button>使用location.reload(true)实现重新载入页面并强制清空缓存</button>
    <br />
    <button>使用location.replace()实现替换当前页面</button>
    <br />
  </body>
</html>
