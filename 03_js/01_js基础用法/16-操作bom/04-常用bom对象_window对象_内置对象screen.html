<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常用bom对象_window对象_内置对象screen</title>
    <script>
      /**
       * Screen 对象核心指南
       *
       * 1. 基本定义：
       *    - screen 对象包含有关客户端显示屏幕的信息。
       *    - 每个 window 对象的 screen 属性都引用一个 screen 对象。
       *
       * 2. 使用方式：
       *    - screen 是 window 的内置对象，可以直接使用，也可以通过 window.screen 访问。
       *
       * 3. 应用场景与优化：
       *    - 优化输出：根据显示器尺寸选择使用大图像或小图像。
       *    - 颜色适配：根据显示器的颜色深度（如 16 位或 8 位）选择图形。
       *    - 窗口定位：根据屏幕尺寸信息将新打开的浏览器窗口定位在屏幕中间。
       */
      window.onload = () => {
        /**
         * 场景：打印 screen 对象常用属性
         *
         * 属性详解：
         * - availHeight: 返回视口高度（扣除系统任务栏之后的可伸缩高度）。
         * - availWidth: 返回视口宽度（扣除系统任务栏之后的可伸缩宽度）。
         * - colorDepth: 返回目标设备或缓冲器上调色板的比特深度（色彩位数）。
         * - height: 返回屏幕的总高度。
         * - width: 返回屏幕的总宽度。
         */
        document.querySelectorAll('button')[0].addEventListener('click', () => {
          // 输出 screen 对象
          console.log(screen)
          // 返回视口高度(除windows任务栏之外)
          console.log(screen.availHeight)
          // 返回视口宽度(除windows任务栏之外)
          console.log(screen.availWidth)
          // 返回目标设备或缓冲器上调色板的比特深度
          console.log(screen.colorDepth)
          // 返回屏幕高度
          console.log(screen.height)
          // 返回屏幕宽度
          console.log(screen.width)
        })
      }
    </script>
  </head>
  <body>
    <button>打印screen对象常用属性</button>
  </body>
</html>
