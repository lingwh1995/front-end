<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常用bom对象_window对象_内置对象history</title>
    <script>
      /**
       * History 对象核心指南
       *
       * 1. 基本定义：
       *    - history 对象主要用于操作浏览器的历史记录堆栈，实现向前或向后翻页。
       *
       * 2. 使用方式：
       *    - history 是 window 的内置对象，可以直接使用，也可以通过 window.history 访问。
       *
       * 3. 核心功能：
       *    - 获取历史记录长度。
       *    - 实现类似浏览器前进、后退按钮的功能。
       */
      window.onload = () => {
        /**
         * 场景一：打印 history 对象常用属性
         *
         * 属性说明：
         * - length: 返回当前会话历史记录中的条目数量（包含当前页面）。
         */
        document.querySelectorAll('button')[0].addEventListener('click', () => {
          // 输出 history 对象
          console.log(history)
          // 可以获取到当成访问的链接数量
          console.log(history.length)
        })

        /**
         * 场景二：back() 方法
         *
         * 功能：回退到上一个页面。
         * 参照：作用等同于浏览器的“后退”按钮。
         */
        document.querySelectorAll('button')[1].addEventListener('click', () => {
          history.back()
        })

        /**
         * 场景三：forward() 方法
         *
         * 功能：跳转到下一个页面（前提是历史记录中存在下一页）。
         * 参照：作用等同于浏览器的“前进”按钮。
         */
        document.querySelectorAll('button')[2].addEventListener('click', () => {
          history.forward()
        })

        /**
         * 场景四：go() 方法
         *
         * 功能：根据相对于当前页面的偏移量进行跳转。
         * 参数说明：
         *    -  1：表示向前跳转一个页面，相当于 forward()。
         *    -  2：表示向前跳转两个页面。
         *    - -1：表示向后跳转一个页面，相当于 back()。
         *    - -2：表示向后跳转两个页面。
         */
        document.querySelectorAll('button')[3].addEventListener('click', () => {
          history.go(1)
        })
      }
    </script>
  </head>
  <body>
    <button>打印history对象常用属性</button>
    <button>使用location.back()实现页面回退</button>
    <button>使用location.forward()实现页面跳转</button>
    <button>使用location.go()实现指定页面跳转</button>
  </body>
</html>
