<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM 节点增删改查完全手册</title>
    <script type="text/javascript">
      window.onload = () => {
        /**
         * ------------------------------------------
         * 第一部分：节点查找与层级导航 (查询)
         * ------------------------------------------
         */

        // 1. 获取当前元素基本信息
        document.querySelectorAll('button')[0].onclick = () => {
          let p = document.querySelector('#p')
          console.log(`当前元素文本: ${p.innerText}`)
        }

        // 2. 获取父级节点 (parentElement vs parentNode)
        document.querySelectorAll('button')[1].onclick = () => {
          let pElement = document.querySelector('#p')
          console.log('父元素(Element):', pElement.parentElement)
          console.log('父节点(Node):', pElement.parentNode)
        }

        // 3. 获取所有子节点 (含文本/注释节点)
        document.querySelectorAll('button')[2].onclick = () => {
          let div = document.querySelector('div')
          let childNodes = div.childNodes // 返回 NodeList
          childNodes.forEach((node) => console.log(`节点名称: ${node.nodeName}`))
        }

        // 4. 获取所有子元素 (仅限标签)
        document.querySelectorAll('button')[3].onclick = () => {
          let div = document.querySelector('div')
          let children = div.children // 返回 HTMLCollection
          Array.from(children).forEach((child) => console.log(`元素内容: ${child.innerText}`))
        }

        // 5. 获取子节点个数
        document.querySelectorAll('button')[4].onclick = () => {
          let div = document.querySelector('div')
          console.log(`计数方式一 (childElementCount): ${div.childElementCount}`)
          console.log(`计数方式二 (children.length): ${div.children.length}`)
        }

        // 6. 获取首尾子节点
        document.querySelectorAll('button')[5].onclick = () => {
          let div = document.querySelector('div')
          console.log('第一个子元素:', div.firstElementChild.innerText)
        }
        document.querySelectorAll('button')[6].onclick = () => {
          let div = document.querySelector('div')
          console.log('最后一个子元素:', div.lastElementChild.innerText)
        }

        // 7. 兄弟节点导航
        document.querySelectorAll('button')[7].onclick = () => {
          let p = document.querySelector('#p')
          console.log('前一个兄弟元素:', p.previousElementSibling.innerText)
        }
        document.querySelectorAll('button')[8].onclick = () => {
          let p = document.querySelector('#p')
          console.log('后一个兄弟元素:', p.nextElementSibling.innerText)
        }

        /**
         * ------------------------------------------
         * 第二部分：节点删除 (删)
         * ------------------------------------------
         */

        // 方式一：通过父元素删除 (W3C 标准方法，兼容性最好)
        document.querySelectorAll('button')[9].onclick = () => {
          let div = document.querySelector('div')
          let lastPNode = document.querySelector('#last-p')
          if (lastPNode) div.removeChild(lastPNode)
        }

        // 方式二：自删除 (现代浏览器方法，语法更简洁)
        document.querySelectorAll('button')[10].onclick = () => {
          let lastPNode = document.querySelector('#last-p')
          if (lastPNode) lastPNode.remove()
        }

        // 方式三：清空内容 (仅清空内容，不建议用于删除节点本身)
        document.querySelectorAll('button')[11].onclick = () => {
          let lastPNode = document.querySelector('#last-p')
          if (lastPNode) lastPNode.innerHTML = ''
        }

        /**
         * ------------------------------------------
         * 第三部分：节点创建与动态挂载 (增)
         * ------------------------------------------
         */

        // 1. 创建并添加元素节点
        document.querySelectorAll('button')[12].onclick = () => {
          const div = document.querySelector('div')
          const newElement = document.createElement('p') // 创建标签
          newElement.innerText = '我是新创建的 P 标签' // 设置内容
          newElement.title = 'dynamic-p' // 设置属性
          div.appendChild(newElement) // 挂载到父元素末尾
        }

        // 2. 创建纯文本节点
        document.querySelectorAll('button')[13].onclick = () => {
          const div = document.querySelector('div')
          const newTextNode = document.createTextNode(' | 我是追加的纯文本 | ')
          div.appendChild(newTextNode)
        }

        // 3. 使用文档碎片 (DocumentFragment - 性能优化利器)
        // 原理：创建一个虚拟容器，多次操作只引发一次页面重绘
        document.querySelectorAll('button')[14].onclick = () => {
          const div = document.querySelector('div')
          const fragment = document.createDocumentFragment()

          const tags = ['h1', 'h2', 'h3']
          tags.forEach((tagName) => {
            const el = document.createElement(tagName)
            el.textContent = `我是批量生成的 ${tagName}`
            fragment.appendChild(el) // 先添加到内存碎片中
          })

          div.appendChild(fragment) // 一次性挂载到 DOM 树
        }

        /**
         * ------------------------------------------
         * 第四部分：内容修改 (改)
         * ------------------------------------------
         * 1. innerHTML: 会解析 HTML 标签，支持样式渲染。
         * 2. innerText/textContent: 仅处理纯文本，不会解析标签。
         */
        document.querySelectorAll('button')[15].onclick = () => {
          let k = document.querySelector('#k')
          // 使用 innerHTML 动态注入带样式的元素
          k.innerHTML = '<span style="color:red; font-size:24px;">内容已更新并渲染样式</span>'
        }
      }
    </script>
  </head>
  <body>
    <div style="background: #f4f4f4; padding: 10px; margin-bottom: 10px">
      <h3>控制面板</h3>
      <button>获取当前元素</button>
      <button>获取父节点</button>
      <button>获取所有子元素</button>
      <button>获取所有子节点</button>
      <br />
      <button>获取子节点个数</button>
      <button>获取第一个子节点</button>
      <button>获取最后一个子节点</button>
      <button>获取前一兄弟</button>
      <button>获取后一兄弟</button>
      <br />
      <button>删除方式1(推荐)</button>
      <button>删除方式2(remove)</button>
      <button>删除方式3(不推荐)</button>
      <br />
      <button>创建元素节点</button>
      <button>创建文本节点</button>
      <button>创建文档碎片</button>
      <button>修改内容(HTML)</button>
    </div>

    <div border="1">
      <p>我是第一个子节点</p>
      <p>我是 p 元素的前一个兄弟节点</p>
      <p id="p" style="color: blue; font-weight: bold">我是核心 P 元素</p>
      <p>我是 p 元素的后一个兄弟节点</p>
      <k id="k"></k>
      <p id="last-p">我是最后一个子节点</p>
    </div>
  </body>
</html>
