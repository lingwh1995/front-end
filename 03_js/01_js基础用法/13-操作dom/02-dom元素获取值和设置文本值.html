<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dom元素获取值和设置文本值</title>
    <script type="text/javascript">
      /**
       * 核心发现：innerHTML 的解析行为
       *
       * 1. 标准标签：如 <div>1111</div>，innerHTML 仅获取标签内部的文本或子标签。
       * 2. 非标/嵌套错误：如 <div>2222<div/>，浏览器在尝试修复 DOM 树时，
       *    innerHTML 可能会暴露其解析后的源代码结构。
       */

      /**
       * 取值操作
       * 功能：通过 innerHTML 获取指定 ID 元素的内部 HTML 内容。
       */
      const getDomValue = () => {
        var div = document.getElementById('div-1')
        var text = div.innerHTML
        alert(text)
      }

      /**
       * 赋值操作
       * 功能：覆盖指定 ID 元素的原有内容。
       */
      const setDomValue = () => {
        var div = document.getElementById('div-2')
        div.innerHTML = '这里是赋值的html内容，哈哈，还可以赋值'
      }

      /**
       * 渲染操作
       * 原理：利用 innerHTML 会解析 HTML 标签的特性，结合行内 CSS 进行样式渲染。
       * 注意：行内 CSS 多个样式之间务必用分号 (;) 隔开。
       * 格式示例：<span style="color:red; font-size:50px">Hello World</span>
       */
      const renderDom = () => {
        var div = document.getElementById('div-3')
        // 使用 style 属性直接注入 CSS 样式
        div.innerHTML = "<font style='color:red;font-size:50px'>html渲染效果展示</font>"
      }
    </script>
  </head>
  <body>
    <div id="div-1">这里是显示的html内容</div>
    <input type="button" name="" value="显示（取值）" onclick="getDomValue()" />

    <div id="div-2">这里是赋值的html内容</div>
    <input type="button" name="" value="赋值" onclick="setDomValue()" />

    <div id="div-3">html渲染效果展示</div>
    <input type="button" name="" value="渲染" onclick="renderDom()" />
  </body>
</html>
