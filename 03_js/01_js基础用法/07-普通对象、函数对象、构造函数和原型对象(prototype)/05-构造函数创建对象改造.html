<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>构造函数创建对象改造</title>
    <script>
      /**
       * 构造函数优化探讨
       *
       * 1. 核心问题：为什么要优化构造函数？
       *    - 如果不改进，每创建一个对象，构造函数内部的方法就会被重新创建一次。
       *    - 若创建十万个对象，该方法就会占用十万份内存空间，造成极大的资源浪费。
       *
       * 2. 优化方式 (过渡方案)：
       *    - 将方法定义在【全局函数】中。
       *    - 在构造函数内部仅保存该全局方法的【引用】。
       *
       * 3. 方案缺点：
       *    - 污染全局作用域：全局命名空间变得臃肿，难以维护。
       *    - 安全性差：在多人协同开发时，全局函数极易被意外覆盖或修改。
       */

      //优化前
      /*
      function Person(name, age, gender) {
        this.name = name
        this.age = age
        this.gender = gender
        this.sayName = function() {
          console.log(this.name)
        }
      }
      */

      //优化后：通过chrome浏览器可以观察到节省了将近一半内存
      function Person(name, age, gender) {
        this.name = name
        this.age = age
        this.gender = gender
        this.sayName = sayName
      }

      function sayName() {
        console.log(this.name)
      }

      console.log('十万个对象创建开始...')
      for (let i = 0; i < 100000; i++) {
        new Person('张三', i, '男')
      }
      console.log('十万个对象创建完成...')
    </script>
  </head>
  <body></body>
</html>
