<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>判断属性是构造函数原型对象(prototype)的还是实例的</title>
    <script>
      /**
       * 原型对象 (Prototype) 与 原型链
       *
       * 1. 核心概念：
       *    - 原型对象是一个公共区域，所有类的实例均可访问。
       *    - 建议将对象中的公共内容（属性/方法）统一设置在原型对象中。
       *
       * 2. 嵌套特性：
       *    - 原型对象本身也是一个对象，因此它也有自己的原型。
       *
       * 3. 属性/方法查找机制 (原型链搜索)：
       *    当访问一个对象的属性或方法时，查找路径如下：
       *    - 第一步：在【当前对象自身】寻找。
       *      - 若找到，直接使用。
       *    - 第二步：若自身没有，去【原型对象】中寻找。
       *      - 若找到，直接使用。
       *    - 第三步：若原型中仍未找到，继续向上去【原型对象的原型】中查找。
       *      - 此过程会持续进行，直到查找到 【Object 顶级对象】 为止。
       *
       * 4. 最佳实践：
       *    - 核心思路：共有的方法和属性应统一添加到构造函数的原型对象中。
       *    - 优势：
       *      - 节省内存：避免为每个实例重复创建相同内容。
       *      - 隔离作用域：逻辑封装在原型内，不污染全局空间。
       */
      function MyClass() {}

      MyClass.prototype.name = 'zhangsan'

      const mc = new MyClass()
      mc.age = 23

      // 用in检查某个对象中是否包含某个属性，如果对象中没有，原型对象中有也会返回true
      console.log('name' in mc)
      console.log('age' in mc)

      // 用hasOwnProperty检查某个对象中是否包含某个属性，如果对象中有会返回true,如果对象中没有，原型对象中有会返回false
      console.log(mc.hasOwnProperty('name'))
      console.log(mc.hasOwnProperty('age'))
      console.log('----')
      console.log(MyClass.prototype.hasOwnProperty('name'))
      console.log(MyClass.prototype.hasOwnProperty('age'))
      console.log('----')

      // 如果在对象的原型对象中查找属性没有找到，就到对象的原型对象的原型对象中查找属性，直到找到Object对象为止
      console.log(mc.hasOwnProperty('hasOwnProperty'))
      console.log(mc.__proto__.__proto__.hasOwnProperty('hasOwnProperty'))
      console.log(MyClass.prototype.__proto__.hasOwnProperty('hasOwnProperty'))
      //console.log(Object.prototype)
    </script>
  </head>
  <body></body>
</html>
