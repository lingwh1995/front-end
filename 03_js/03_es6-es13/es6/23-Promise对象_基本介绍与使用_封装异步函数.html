<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise的介绍与基本使用_封装异步函数</title>
    <script>
      /**
       * Promise 核心概念：
       * 1. Promise 是 ES6 引入的异步编程解决方案，本质是一个容器，包含着某个未来才会结束的事件。
       * 2. 状态分离：Promise 将异步操作本身与结果处理逻辑解耦。响应结果不再在异步函数回调中处理，
       *    而是通过 promise.then() 进行链式调用，极大提高了代码的可读性和维护性。
       */
      const promise = new Promise((resolve, reject) => {
        /**
         * 执行器函数 (Executor) 会立即执行。
         * 我们在这里放置异步任务（如 Ajax、定时器、文件读取等）。
         */
        setTimeout(() => {
          /**
           * 状态切换机制：
           * - 调用 resolve(data)：将状态由 Pending(进行中) 转为 Fulfilled(已成功)，并传递成功结果。
           * - 调用 reject(error)：将状态由 Pending(进行中) 转为 Rejected(已失败)，并传递失败原因。
           * 注意：状态一旦改变（凝固），就不会再变。
           */

          // 成功情况示例：
          // let data = '数据库中的数据';
          // resolve(data);

          // 失败情况示例：
          let error = '数据读取失败'
          reject(error)
        }, 1000)
      })

      /**
       * 结果处理：
       * then 方法接收两个回调函数：
       * 第一个参数 (value) 是状态变为成功时的回调。
       * 第二个参数 (reason) 是状态变为失败时的回调。
       * 遵循“约定优于配置”原则，通常命名为 value 和 reason。
       */
      promise.then(
        (value) => {
          console.log('成功：', value)
        },
        (reason) => {
          console.error('失败：', reason)
        }
      )

      // 辅助测试：模拟 API 请求延迟
      // new Promise(resolve => setTimeout(resolve, 5000));
    </script>
  </head>
  <body></body>
</html>
