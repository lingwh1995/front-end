<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字符串新增重要方法合集</title>
    <script>
      /**
       * 一、子串检索
       * 均返回布尔值 (Boolean)
       */
      // 1. includes(): 判断是否包含参数字符串
      console.log('hello world'.includes('hello'))

      // 2. startsWith(): 判断参数字符串是否在原字符串的头部
      console.log('hello world'.startsWith('hello'))

      // 3. endsWith(): 判断参数字符串是否在原字符串的尾部
      console.log('hello world'.endsWith('world'))

      /**
       * 二、内容补全
       * 常用于日期格式化、数字对齐等场景
       */
      // 4. padStart(targetLength, padString): 头部补全
      console.log('c'.padStart(5, 'ab')) // 'ababc'
      console.log('c'.padStart(4, 'ab')) // 'abac'
      console.log('abc'.padStart(10, '123456789')) // '1234567abc'

      // 5. padEnd(targetLength, padString): 尾部补全
      console.log('c'.padEnd(5, 'ab')) // 'cabab'
      console.log('c'.padEnd(4, 'ab')) // 'caba'

      /**
       * 三、重复与位置
       */
      // 6. repeat(count): 返回一个新字符串，表示将原字符串重复 n 次
      // 注意：如果是小数，会被向下取整
      console.log('a'.repeat(2.9)) // "aa"

      // 7. at(index): 接受一个整数作为参数，返回指定位置的字符
      // 特点：支持负索引（如 -1 表示倒数第一个字符）
      const str = 'hello'
      console.log(str.at(1)) // "e"
      console.log(str.at(-1)) // "o"

      /**
       * 四、正则匹配与替换
       */
      // 8. matchAll(): 返回一个包含所有匹配结果的迭代器，通常配合 for...of 或解构使用

      // 9. replaceAll(): 一次性替换所有匹配的子串，返回新字符串，不改变原字符串

      /**
       * 五、修剪空白
       */
      // 10. trimStart(): 删除字符串开头的空白字符（别名 trimLeft）
      console.log('   hello world  '.trimStart())

      // 11. trimEnd(): 删除字符串末尾的空白字符（别名 trimRight）
      console.log('   hello world  '.trimEnd())
    </script>
  </head>
  <body></body>
</html>
