<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>对象简化写法</title>
    <script>
      /**
       * ES6 对象简化写法
       * 允许在大括号里直接写入变量和函数，作为对象的属性和方法
       */
      const name = '张三'
      const school = '西安财经大学'
      const printName = () => {
        console.log(`姓名：${name}`)
      }

      const user = {
        // 属性简写：等价于 name: name
        name,
        // 属性简写：等价于 school: school
        school,
        // 方法简写（外部定义）：等价于 printName: printName
        printName,

        /**
         * 方法简写（内部定义）：
         * 下面写法等价于：
         * 1. printSchool: function() { ... } (传统写法)
         * 2. printSchool: () => { ... } (箭头函数写法)
         */
        printSchool() {
          console.log(`学校：${school}`)
        },
      }

      console.log(`name:${user.name}, ${user.school}`)
      user.printName()
      user.printSchool()
    </script>
  </head>
  <body></body>
</html>
