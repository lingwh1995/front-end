<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symbol的介绍和创建</title>
    <script>
      /**
       * ES6 引入了一种新的原始数据类型 Symbol，表示独一无二的值。
       * 它是 JS 的第七种数据类型（基本类型），是一种类似于字符串的数据类型。
       */

      /**
       * 1. 创建 Symbol
       * 方式一：直接创建
       * 每次调用 Symbol() 都会返回一个唯一的 Symbol 值，即使描述文字相同。
       */
      let symbol1 = Symbol()
      console.log(symbol1)
      console.log(typeof symbol1)

      let symbol2 = Symbol('hello')
      console.log(symbol2)

      /**
       * 1. 创建 Symbol
       * 方式二：Symbol.for() 创建
       * 会在全局注册表中搜索描述为 'hello' 的 Symbol，若存在则返回，若不存在则创建。
       */
      let symbol3 = Symbol.for('hello')
      console.log(symbol3)

      /**
       * 2. 注意事项
       * Symbol 类型不能与其他数据类型（甚至其他 Symbol 类型）进行运算。
       */
      // const s1 = symbol3 + 100;    // 报错
      // const s2 = symbol3 > 100;    // 报错
      // const s3 = symbol3 + symbol3; // 报错
    </script>
  </head>
  <body></body>
</html>
