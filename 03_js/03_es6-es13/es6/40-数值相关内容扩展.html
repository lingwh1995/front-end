<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数值相关内容扩展</title>
  </head>
  <body>
    <script>
      /**
       * 0. Number.EPSILON：JavaScript 表示的最小精度
       * 用处：解决浮点数计算不精确的问题（如 0.1 + 0.2 !== 0.3）。
       * 只要两个数的差值小于 EPSILON，就可以认为它们相等。
       */
      /*
        function equal(a, b){
            return Math.abs(a - b) < Number.EPSILON;
        }
        console.log(0.1 + 0.2 === 0.3); // false
        console.log(equal(0.1 + 0.2, 0.3)); // true
        */

      /**
       * 1. 进制表示法
       * 0b: 二进制 (Binary)
       * 0o: 八进制 (Octal)
       * 0x: 十六进制 (Hexadecimal)
       */
      /*
        let b = 0b1010; // 10
        let o = 0o777;  // 511
        let d = 100;    // 100
        let x = 0xff;   // 255
        console.log(x);
        */

      /**
       * 2. Number.isFinite：检测一个数值是否为有限数
       */
      /*
        console.log(Number.isFinite(100));      // true
        console.log(Number.isFinite(100/0));    // false
        console.log(Number.isFinite(Infinity)); // false
        */

      /**
       * 3. Number.isNaN：检测一个数值是否为 NaN
       */
      /*
        console.log(Number.isNaN(123)); 
        */

      /**
       * 4. Number.parseInt 与 Number.parseFloat
       * 将方法从全局 window 移植到了 Number 对象上，使 API 更加模块化。
       */
      /*
        console.log(Number.parseInt('5211314love'));   // 5211314
        console.log(Number.parseFloat('3.1415926神奇')); // 3.1415926
        */

      /**
       * 5. Number.isInteger：判断一个数是否为整数
       */
      /*
        console.log(Number.isInteger(5));   // true
        console.log(Number.isInteger(2.5)); // false
        */

      /**
       * 6. Math.trunc：直接去除数字的小数部分，保留整数
       */
      /*
        console.log(Math.trunc(3.5)); // 3
        */

      /**
       * 7. Math.sign：判断数值的符号
       * 返回值：正数返回 1，负数返回 -1，零返回 0
       */
      console.log(Math.sign(100)) // 1
      console.log(Math.sign(0)) // 0
      console.log(Math.sign(-20000)) // -1
    </script>
  </body>
</html>
