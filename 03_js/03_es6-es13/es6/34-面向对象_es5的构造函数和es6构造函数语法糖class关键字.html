<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面向对象_es5的构造函数和es6构造函数语法糖class关键字</title>
    <script>
      /**
       * ES5 传统写法
       * 
       * 1. 使用普通的 function 定义，手动绑定原型方法。
       * 2. 需要手动将方法添加到原型上。
       */
      function Dog(name, age) {
        this.name = name
        this.age = age
      }

      // 在原型上添加方法
      Dog.prototype.sayHello = function () {
        console.log(`你好，我是 ${this.name}，我今年 ${this.age} 岁了`)
      }

      const dogBlack = new Dog('小黑狗', 5)
      const dogWhite = new Dog('小白狗', 5)
      dogBlack.sayHello()
      dogWhite.sayHello()
      console.log('--------------------------')

      /**
       * ES6 Class 写法
       * 
       * 1. 使用 class 关键字，构造逻辑放在 constructor 中，创建对象时自动调用 constructor 中逻辑。
       * 2. 方法直接写在类块里，不需要手动将方法添加到原型上。
       * 3. ES6 class 是一种语法糖，底层仍然是基于原型的。
       *
       * ES6 class 的核心改进
       * 
       * 1. 必须使用 new 调用：普通的构造函数可以直接作为函数执行（如 User()），这会导致 this 指向错误。
       *    但 class 必须通过 new 调用，否则会直接报错，更安全。
       * 2. 方法不可枚举：在 class 中定义的方法默认是不可枚举的（enumerable: false），这符合大多数开发
       *    场景的需求，保持了对象的整洁。
       * 3. 更简单的继承：通过 extends 和 super 关键字，实现继承比以前修改 prototype 指向要简单得多。
       * 4. 严格模式：class 内部的代码默认运行在严格模式下。
       * 5. 私有属性：class 允许定义私有属性，私有属性只能在类内部访问，外部无法访问。
       * 6. 静态属性：class 允许定义静态属性，静态属性只能通过类名访问，实例无法访问。
        
            class BankAccount {
                #balance = 0; // # 表示私有属性，外部无法直接访问（真正意义上的私有）

                constructor(owner) {
                    this.owner = owner;
                }

                deposit(amount) {
                    this.#balance += amount;
                    console.log(`存入后余额为: ${this.#balance}`);
                }

                static bankName() { // static 表示静态方法，只能通过类名调用
                    return "中央银行";
                }
            }
                
       */
      class Cat {
        // 构造器：等同于旧的构造函数体
        constructor(name, age) {
          this.name = name
          this.age = age
        }

        // 原型方法：等同于 Cat.prototype.sayHello
        sayHello() {
          console.log(`你好，我是 ${this.name}，我今年 ${this.age} 岁了`)
        }
      }

      const catBlack = new Cat('小黑猫', 5)
      const catWhite = new Cat('小白猫', 10)
      catBlack.sayHello()
      catWhite.sayHello()
      console.log('--------------------------')
    </script>
  </head>
  <body></body>
</html>
