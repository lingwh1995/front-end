<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object对象新增方法_is、assign、扩展运算符、原型操作</title>
    <script>
      /**
       * 1. Object.is(value1, value2)
       * 判断两个值是否完全相等。
       * 与 === 的区别：
       *   - Object.is(NaN, NaN) 返回 true (而 NaN === NaN 为 false)
       *   - Object.is(+0, -0) 返回 false (而 +0 === -0 为 true)
       */
      console.log(Object.is(100, 100)) // true
      console.log(Object.is(100, '100')) // false (不进行类型转换)
      console.log(Object.is(NaN, NaN)) // true
      console.log(NaN === NaN) // false
      console.log('------------01------------')

      /**
       * 2. 对象合并：Object.assign 与 扩展运算符 (...)
       * 共同点：
       *   - 都是“浅拷贝” (Shallow Copy)：如果属性值是对象，拷贝的是引用地址。
       *   - 覆盖规则：后方的同名属性会覆盖前方的属性。
       */
      const cat = { name: '小肥', color: 'white' }
      const source1 = {
        id: '001',
        name: '张三',
        hobby: '抽烟',
        pet: cat,
      }
      const source2 = {
        id: '002',
        name: '李四',
      }
      let target = {}

      /**
       * 合并方式一：Object.assign(target, ...sources)
       * 特点：会改变第一个参数（目标对象）的内容。
       */
      target = Object.assign(target, source1, source2)
      console.log('Object.assign 合并结果:', target)

      /**
       * 合并方式二：扩展运算符 {...obj1, ...obj2}
       * 特点：生成一个全新的对象，不影响原有的 source 对象，语法更简洁。
       */
      console.log('扩展运算符 合并结果:', { ...source1, ...source2 })

      /**
       * 特别注意：Object.assign 处理数组
       * 它会将数组视为对象，索引作为键。下例中 sourceArrs 的索引 0, 1 覆盖了 targetArrs 的 0, 1。
       */
      const targetArrs = [1, 2, 3]
      const sourceArrs = [4, 5]
      Object.assign(targetArrs, sourceArrs)
      console.log('数组 assign 结果:', targetArrs) // [4, 5, 3]
      console.log('------------02------------')

      /**
       * 3. 原型对象操作
       * ES6 推荐使用以下方法代替直接操作 __proto__ 属性。
       */
      const person = {
        name: '人类',
      }
      const man = {
        name: '男人',
      }

      // 设置原型：将 man 的原型指向 person
      // Object.setPrototypeOf(obj, proto)
      Object.setPrototypeOf(man, person)

      // 获取原型：读取对象的 prototype
      // Object.getPrototypeOf(obj)
      console.log('man 的原型对象:', Object.getPrototypeOf(man))
      console.log('man 实例:', man)
      console.log('------------03------------')
    </script>
  </head>
  <body></body>
</html>
