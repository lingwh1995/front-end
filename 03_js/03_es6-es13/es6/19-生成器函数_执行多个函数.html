<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生成器函数_执行多个函数</title>
    <script>
      /**
       * 生成器函数 (Generator)
       * 应用场景：异步任务的同步化表达。
       * 可以将复杂的异步回调逻辑（如 Ajax 轮询）拆分成多个独立的函数，并通过 yield 顺序调用。
       */

      // 定义外部业务函数
      const fun1 = () => {
        console.log('生成器函数中第一部分调用外部的函数执行了...')
      }
      const fun2 = () => {
        console.log('生成器函数中第二部分调用外部的函数执行了...')
      }
      const fun3 = () => {
        console.log('生成器函数中第三部分调用外部的函数执行了...')
      }

      /**
       * 生成器内部封装业务流程
       */
      function* generator() {
        fun1()
        yield '一只没有耳朵'

        fun2()
        yield '一只没有眼睛'

        fun3()
        yield '真奇怪'
      }

      // 1. 初始化迭代器
      const iterator = generator()

      // 2. 执行 fun1 并暂停
      const firstFunExecResult = iterator.next()
      console.log(firstFunExecResult)

      // 3. 执行 fun2 并暂停
      const secondFunExecResult = iterator.next()
      console.log(secondFunExecResult)

      // 4. 执行 fun3 并暂停
      const thirdFunExecResult = iterator.next()
      console.log(thirdFunExecResult)

      // 5. 流程结束
      const end = iterator.next()
      console.log(end)
    </script>
  </head>
  <body></body>
</html>
