<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise对象_Promise对象的then方法</title>
    <script>
      const promise = new Promise((resolve, reject) => {
        setTimeout(() => {
          /**
           * 状态切换：
           * 调用 resolve()：设置状态为 fulfilled (成功)
           * 调用 reject()： 设置状态为 rejected (失败)
           */
          let error = '数据读取失败'
          reject(error)
        }, 1000)
      })

      /**
       * Promise.prototype.then() 核心要点：
       * 1. 返回值：then() 方法执行后总是返回一个新的 Promise 对象。
       * 2. 状态决定权：返回的新 Promise 状态由回调函数的执行结果决定：
       *    - 返回非 Promise 对象：新 Promise 状态为成功，返回值为该对象。
       *    - 返回 Promise 对象：新 Promise 的状态和值取决于该返回的 Promise。
       *    - 抛出错误 (throw)：新 Promise 状态立即变为失败，返回值为抛出的异常。
       * 3. 链式调用：由于每次 then 都返回 Promise，因此可以无限链式下去。
       */

      /* 
    // 逻辑演示：
    const thenReturnResult = promise.then(value => {
      console.log(value);
      // 1. 返回非 Promise 对象 -> 结果 Promise 为成功
      // return 'OK'; 

      // 2. 返回 Promise 对象 -> 结果 Promise 与此对象状态一致
      // return Promise.resolve('Success');
    }, reason => {
      console.log(reason);
      // 3. 抛出错误 -> 结果 Promise 为失败
      throw '发生了意料之外的错误';
    });
    console.log(thenReturnResult); 
    */

      /**
       * then() 的链式调用示例
       */
      promise
        .then(
          (value) => {
            console.log('第一个 then 成功:', value)
            return true // 成功回调返回非 Promise，第二个 then 会进入成功分支
          },
          (reason) => {
            console.log('第一个 then 失败:', reason)
            return false // ！！注意：失败回调若返回非 Promise，第二个 then 也会进入成功分支
          }
        )
        .then(
          (value) => {
            console.log('第二个 then 成功:', value)
            console.log('------ 链式调用成功，逻辑继续向下传递 ------')
          },
          (reason) => {
            console.log('第二个 then 失败:', reason)
          }
        )
    </script>
  </head>

  <body></body>
</html>
