<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字符串的padStart()和padEnd()方法</title>
    <script>
      /**
       * 1. padStart(targetLength, padString) [ES8]
       * - 功能：从字符串的“开头”填充指定字符，直到达到目标长度。
       * - 常用于：数字补零（如月份 09）、隐藏敏感信息（如 ****1234）。
       */
      console.log('5'.padStart(2, '0')) // 输出："05"

      /**
       * 2. padEnd(targetLength, padString) [ES8]
       * - 功能：从字符串的“结尾”填充指定字符，直到达到目标长度。
       * - 常用于：列表对齐、固定长度占位。
       */
      console.log('test'.padEnd(6, '!')) // 输出："test!!"
      console.log('------------01------------')
    </script>
  </head>
  <body></body>
</html>
