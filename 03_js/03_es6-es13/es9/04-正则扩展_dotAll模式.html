<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES9中正则扩展_dotAll模式</title>
    <script>
      /**
       * 特性：dotAll 模式 (s 修饰符)
       *
       * 1. 传统限制：元字符点号 (.) 匹配除换行符以外的任意单个字符。
       * 2. 新增功能：通过在正则末尾添加 's' 修饰符，点号 (.) 即可匹配包含“换行符”在内的任意字符。
       * 3. 应用场景：非常适合爬虫或处理包含多行 HTML 结构的字符串。
       */

      // 待匹配的 HTML 字符串（包含大量换行和空格）
      let str = `
      <ul>
          <li>
              <a>肖生克的救赎</a>
              <p>上映日期: 1994-09-10</p>
          </li>
          <li>
              <a>阿甘正传</a>
              <p>上映日期: 1994-07-06</p>
          </li>
      </ul>`

      /**
       * 正则说明：
       * - .*?  : 非贪婪匹配任意字符。
       * - /gs  :
       *   - g: 全局匹配（用于循环提取所有结果）。
       *   - s: dotAll 模式（让点号可以匹配换行，从而跨越 <li> 和 <a> 之间的空隙）。
       */
      const reg = /<li>.*?<a>(.*?)<\/a>.*?<p>(.*?)<\/p>/gs

      // 执行匹配逻辑
      let result
      let data = []

      // 使用 while 循环配合全局匹配 g，逐个提取电影信息
      while ((result = reg.exec(str))) {
        data.push({
          title: result[1], // 对应第一个括号 (.*?) 匹配的电影名
          time: result[2], // 对应第二个括号 (.*?) 匹配的上映时间
        })
      }

      // 输出提取出的数组对象
      console.log('解析后的电影数据：', data)
      console.log('------------01------------')
    </script>
  </head>

  <body></body>
</html>
